<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RODOVELOCITY">
<meta name="application-name" content="RODOVELOCITY">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<title>RODOVELOCITY</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<!-- Sin Firebase - datos guardados en localStorage del dispositivo -->
<style>
:root{
  --red:#E10600; --red-dark:#a30400; --red-glow:rgba(225,6,0,.45);
  --bg:#0a0a0a; --bg2:#121214; --card:#17171a; --card2:#1e1e22;
  --line:#2a2a2e; --txt:#f5f5f7; --muted:#9a9aa2; --white:#ffffff;
  --ok:#2ecc71; --warn:#f0a500; --danger:#ff3b30;
  --r:18px; --safe: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,system-ui,sans-serif;
  background:var(--bg);color:var(--txt);overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:-2;
  background:radial-gradient(900px 500px at 80% -10%,rgba(225,6,0,.16),transparent 60%),
    radial-gradient(700px 600px at -10% 110%,rgba(225,6,0,.10),transparent 55%),
    linear-gradient(180deg,#0b0b0d,#050505)}
body::after{content:'';position:fixed;inset:0;z-index:-1;opacity:.04;pointer-events:none;
  background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);background-size:44px 44px}
img{display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}

#app{max-width:520px;margin:0 auto;min-height:100%;position:relative;padding-bottom:calc(88px + var(--safe))}
.screen{display:none;animation:fadeUp .45s cubic-bezier(.2,.7,.2,1) both;padding:0 18px}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 26px 2px var(--red-glow)}}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes flick{0%,100%{transform:rotate(-2deg) scale(1)}50%{transform:rotate(2deg) scale(1.05)}}

/* ============ SPLASH SCREEN ANIMATIONS (Modern + Technological + Brutal) ============ */

/* Grid background scanline animation */
@keyframes gridScan{
  0%{opacity:0.3;transform:translateY(-100%)}
  50%{opacity:0.6}
  100%{opacity:0.2;transform:translateY(100%)}
}

/* Logo entrance with scale + rotate */
@keyframes logoEnter{
  0%{
    opacity:0;
    transform:scale(0.3) rotateY(-180deg);
    filter:blur(20px)
  }
  60%{
    opacity:1;
    transform:scale(1.1) rotateY(10deg);
    filter:blur(0)
  }
  100%{
    opacity:1;
    transform:scale(1) rotateY(0deg);
    filter:blur(0);
    text-shadow:0 0 20px rgba(225,6,0,0.6)
  }
}

/* Logo pulse glow */
@keyframes logoPulse{
  0%,100%{
    filter:drop-shadow(0 0 10px rgba(225,6,0,0.4))
  }
  50%{
    filter:drop-shadow(0 0 25px rgba(225,6,0,0.8))
  }
}

/* Title text glitch effect */
@keyframes titleGlitch{
  0%{
    opacity:0;
    transform:translateY(30px) scaleX(0.8);
    text-shadow:none
  }
  35%{
    opacity:0.7;
    transform:translateY(0) scaleX(1);
    text-shadow:-2px 0 #E10600,2px 0 rgba(255,255,255,0.3)
  }
  70%{
    opacity:1;
    text-shadow:0 0 0 rgba(0,0,0,0)
  }
  100%{
    opacity:1;
    transform:translateY(0) scaleX(1);
    text-shadow:0 0 15px rgba(225,6,0,0.5)
  }
}

/* Subtitle fade in */
@keyframes subtitleFade{
  0%{
    opacity:0;
    transform:translateY(15px)
  }
  60%{
    opacity:0;
    transform:translateY(15px)
  }
  100%{
    opacity:0.8;
    transform:translateY(0)
  }
}

/* Splash exit - dramatic fade with blur */
@keyframes splashExit{
  0%{
    opacity:1;
    backdrop-filter:blur(0px)
  }
  85%{
    opacity:1;
    backdrop-filter:blur(0px)
  }
  100%{
    opacity:0;
    backdrop-filter:blur(8px);
    pointer-events:none
  }
}

/* Grid lines tech background */
@keyframes gridMove{
  0%{
    background-position:0 0
  }
  100%{
    background-position:0 100px
  }
}

#splash{
  position:fixed;inset:0;z-index:1000;
  background:linear-gradient(180deg,#0a0a0a 0%,#1a0a0a 50%,#0a0a0a 100%);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  animation:splashExit 3s ease-in forwards;
  perspective:1000px
}

/* Tech grid background */
#splash::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(0deg,rgba(225,6,0,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(225,6,0,0.05) 1px,transparent 1px);
  background-size:40px 40px;
  background-position:0 0;
  animation:gridMove 4s linear infinite;
  z-index:1;
  pointer-events:none
}

/* Scanline effect */
#splash::after{
  content:'';
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    rgba(225,6,0,0.08) 0px,
    rgba(225,6,0,0.08) 2px,
    transparent 2px,
    transparent 4px
  );
  z-index:2;
  pointer-events:none;
  animation:none
}

.splash-content{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  text-align:center
}

.logo-splash{
  width:132px;
  height:132px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:#000;
  border-radius:28px;
  border:2px solid rgba(225,6,0,0.35);
  animation:logoEnter 1.2s cubic-bezier(0.34,1.56,0.64,1) both,
            logoPulse 2.5s ease-in-out 1.2s infinite;
  box-shadow:0 0 40px rgba(225,6,0,0.35),0 10px 30px rgba(0,0,0,0.4)
}

.logo-splash svg,.logo-splash img{
  width:100%;
  height:100%;
  object-fit:cover
}

.splash-title{
  font-size:48px;
  font-weight:900;
  letter-spacing:3px;
  margin:0;
  color:var(--white);
  animation:titleGlitch 1.4s cubic-bezier(0.25,0.46,0.45,0.94) 0.4s both;
  text-transform:uppercase;
  line-height:1.1
}

.splash-title span{
  color:var(--red);
  display:block;
  animation:titleGlitch 1.4s cubic-bezier(0.25,0.46,0.45,0.94) 0.5s both
}

.splash-subtitle{
  font-size:13px;
  letter-spacing:2px;
  color:var(--muted);
  text-transform:uppercase;
  font-weight:700;
  margin:0;
  animation:subtitleFade 1.2s ease-out 1.8s both
}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 18px 10px;position:sticky;top:0;z-index:30;
  background:linear-gradient(180deg,rgba(10,10,10,.92),rgba(10,10,10,.55) 70%,transparent);backdrop-filter:blur(6px)}
.brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:1px;font-size:19px}
.brand .lg{width:34px;height:34px;border-radius:10px;background:#000;border:1px solid #2a2a2e;display:grid;place-items:center;overflow:hidden;
  box-shadow:0 6px 18px var(--red-glow);animation:glow 3.5s infinite}
.brand .lg svg,.brand .lg img{width:100%;height:100%;object-fit:cover}
.brand b{color:var(--white)} .brand span{color:var(--red)}
.avatar-mini{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--red);background:var(--card2)}
.avatar-mini.ph{display:grid;place-items:center;font-weight:800;color:var(--white)}

.card{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.card.pad0{padding:0}
.card .accent{position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(var(--red),var(--red-dark))}
.h-sec{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:22px 4px 12px;font-weight:800}
.title-xl{font-size:27px;font-weight:900;letter-spacing:.3px;margin:2px 0}
.sub{color:var(--muted);font-size:14px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:16px;border-radius:15px;font-weight:800;font-size:16px;
  background:linear-gradient(135deg,var(--red),#ff3b28);color:#fff;box-shadow:0 10px 26px var(--red-glow);transition:transform .12s,box-shadow .2s}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--card2);color:var(--txt);box-shadow:none;border:1px solid var(--line)}
.btn.sm{width:auto;padding:11px 16px;font-size:14px;border-radius:12px}
.btn.dark{background:#000;border:1px solid var(--line);box-shadow:none}
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:999px;background:var(--card2);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--muted)}
.chip.on{background:var(--red);color:#fff;border-color:var(--red)}

/* gate + auth */
#gate,#auth{position:fixed;inset:0;z-index:100;background:radial-gradient(700px 500px at 50% 0%,rgba(225,6,0,.18),transparent),#070707;
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center}
.gate-logo{width:104px;height:104px;border-radius:28px;background:#000;border:1px solid #26262a;display:grid;place-items:center;margin-bottom:18px;overflow:hidden;
  box-shadow:0 18px 50px var(--red-glow);animation:pop .6s both,glow 3.5s 1s infinite}
.gate-logo svg,.gate-logo img{width:100%;height:100%;object-fit:cover}
.gate-title{font-size:34px;font-weight:900;letter-spacing:2px}
.gate-title span{color:var(--red)}
.gate-sub{color:var(--muted);margin:6px 0 30px;letter-spacing:3px;font-size:12px;text-transform:uppercase}
.profile-grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;max-width:420px}
.p-item{display:flex;flex-direction:column;align-items:center;gap:10px;animation:pop .5s both}
.p-ava{width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid var(--line);background:var(--card2);transition:transform .15s;display:grid;place-items:center;font-size:34px;font-weight:900;color:#fff}
.p-item:active .p-ava{transform:scale(.94)}
.p-item .p-ava.add{border-style:dashed;border-color:var(--red);color:var(--red);background:transparent}
.p-name{font-weight:700;font-size:15px}
.auth-box{width:100%;max-width:340px}
.auth-box .input{margin-bottom:12px}
.auth-alt{color:var(--muted);font-size:13px;margin-top:18px}
.auth-alt b{color:var(--red)}
.link{color:var(--red);font-weight:700;text-decoration:underline;cursor:pointer}

#nav{position:fixed;left:0;right:0;bottom:0;z-index:40;max-width:520px;margin:0 auto;
  display:flex;justify-content:space-around;padding:10px 8px calc(10px + var(--safe));
  background:linear-gradient(180deg,rgba(16,16,18,.4),rgba(10,10,12,.96));backdrop-filter:blur(16px);border-top:1px solid var(--line)}
.nav-b{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 14px;border-radius:14px;color:var(--muted);font-size:10.5px;font-weight:700;transition:color .2s;position:relative}
.nav-b svg{width:23px;height:23px}
.nav-b.on{color:var(--red)}
.nav-b.on::before{content:'';position:absolute;top:-1px;width:26px;height:3px;border-radius:3px;background:var(--red);box-shadow:0 0 12px var(--red-glow)}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:13px 10px;text-align:center}
.stat b{display:block;font-size:23px;font-weight:900;color:#fff}
.stat small{color:var(--muted);font-size:11px;letter-spacing:.5px}
.stat.red b{color:var(--red)}
.ring-wrap{display:flex;align-items:center;gap:18px}
.ring{width:96px;height:96px;flex:0 0 auto;position:relative}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-weight:900;font-size:20px}

.plan-card{display:flex;align-items:center;gap:14px;cursor:pointer}
.plan-ico{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;flex:0 0 auto;overflow:hidden;
  background:#000;border:1px solid #26262a;box-shadow:0 8px 20px var(--red-glow)}
.plan-ico svg,.plan-ico img{width:100%;height:100%;object-fit:cover}
.plan-ico.lock{background:var(--card2);color:var(--muted);box-shadow:none;font-size:22px;font-weight:900}
.week{border:1px solid var(--line);border-radius:15px;margin-bottom:11px;overflow:hidden;background:var(--card);transition:border-color .2s}
.week.open{border-color:var(--red)}
.week-h{display:flex;align-items:center;gap:12px;padding:15px;cursor:pointer}
.week-num{width:38px;height:38px;border-radius:11px;background:var(--card2);display:grid;place-items:center;font-weight:900;font-size:15px;flex:0 0 auto}
.week.open .week-num{background:var(--red);color:#fff}
.week-tag{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:800}
.week-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.week.open .week-body{max-height:900px}
.day-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-top:1px solid var(--line);cursor:pointer}
.day-row:active{background:var(--card2)}
.day-ico{width:34px;height:34px;border-radius:10px;background:var(--card2);display:grid;place-items:center;font-size:15px;flex:0 0 auto}
.day-row.done .day-ico{background:var(--ok);color:#000}
.caret{margin-left:auto;color:var(--muted);transition:transform .3s}
.week.open .caret{transform:rotate(90deg)}

#workout{position:fixed;inset:0;z-index:80;background:radial-gradient(600px 500px at 50% -5%,rgba(225,6,0,.18),transparent),#060606;display:none;flex-direction:column}
#workout.on{display:flex;animation:fadeUp .4s both}
.wk-top{display:flex;align-items:center;justify-content:space-between;padding:20px 18px 8px;position:relative;z-index:6}
.wk-close{width:40px;height:40px;border-radius:50%;background:var(--card2);display:grid;place-items:center;font-size:20px;border:1px solid var(--line)}
.wk-prog{height:6px;background:var(--card2);border-radius:6px;margin:6px 18px 0;overflow:hidden}
.wk-prog i{display:block;height:100%;background:linear-gradient(90deg,var(--red),#ff5a45);border-radius:6px;transition:width .5s;box-shadow:0 0 12px var(--red-glow)}
.wk-body{flex:1;overflow-y:auto;padding:14px 18px 30px;display:flex;flex-direction:column}
.ex-count{color:var(--red);font-weight:900;letter-spacing:2px;font-size:13px}
.ex-name{font-size:30px;font-weight:900;line-height:1.05;margin:6px 0 2px}
.ex-ref{color:var(--muted);font-size:13px;margin-bottom:16px}
.set-list{display:flex;flex-direction:column;gap:10px}
.set{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px 16px;transition:.2s;animation:slideIn .35s both}
.set.done{opacity:.5;border-color:var(--ok)}
.set-chk{width:30px;height:30px;border-radius:9px;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center;transition:.2s;font-size:15px}
.set.done .set-chk{background:var(--ok);border-color:var(--ok);color:#000}
.set-info{flex:1}
.set-w{font-size:24px;font-weight:900}
.set-w small{font-size:13px;color:var(--muted);font-weight:700}
.set-meta{font-size:12px;color:var(--muted)}
.set-pct{margin-left:auto;font-size:12px;font-weight:800;color:var(--red);background:rgba(225,6,0,.12);padding:4px 9px;border-radius:8px}
.rest{position:absolute;inset:0;z-index:5;background:rgba(6,6,6,.94);backdrop-filter:blur(10px);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.rest.on{display:flex;animation:fadeUp .3s both}
.rest h3{letter-spacing:3px;color:var(--muted);font-size:13px;text-transform:uppercase}
.timer-ring{width:220px;height:220px;position:relative;margin:16px 0}
.timer-ring .t{position:absolute;inset:0;display:grid;place-items:center;font-size:56px;font-weight:900}
.rest-actions{display:flex;gap:10px}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:90;max-width:520px;margin:0 auto;background:linear-gradient(180deg,var(--card),#0d0d0f);
  border-top-left-radius:26px;border-top-right-radius:26px;border-top:1px solid var(--line);padding:22px 20px calc(26px + var(--safe));
  transform:translateY(110%);transition:transform .4s cubic-bezier(.2,.8,.2,1);box-shadow:0 -20px 50px rgba(0,0,0,.6)}
.sheet.on{transform:none}
.sheet-grip{width:44px;height:5px;border-radius:5px;background:var(--line);margin:0 auto 16px}
.feel-grid{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.feel{display:flex;align-items:center;gap:14px;padding:15px;border-radius:15px;background:var(--card2);border:1px solid var(--line);transition:.15s}
.feel:active{transform:scale(.98)}
.feel .emo{font-size:26px}
.feel b{display:block;font-size:15px}
.feel small{color:var(--muted);font-size:12px}
.feel.f1{border-left:4px solid #3aa0ff}.feel.f2{border-left:4px solid var(--ok)}
.feel.f3{border-left:4px solid var(--warn)}.feel.f4{border-left:4px solid #ff7a00}
.feel.f5{border-left:4px solid var(--danger)}
.coach-box{background:linear-gradient(135deg,rgba(225,6,0,.14),rgba(225,6,0,.03));border:1px solid rgba(225,6,0,.35);border-radius:15px;padding:15px;margin:14px 0;display:flex;gap:12px}
.coach-ava{width:38px;height:38px;border-radius:11px;flex:0 0 auto;background:linear-gradient(135deg,var(--red),#ff4d38);display:grid;place-items:center;font-size:18px;box-shadow:0 6px 16px var(--red-glow)}
.coach-box p{font-size:14px;line-height:1.45}
.coach-box .who{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--red);font-weight:800;margin-bottom:2px}
.modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:22px}
.modal.on{display:flex;animation:fadeUp .3s both}
.modal-card{width:100%;max-width:420px;background:linear-gradient(180deg,var(--card),#0d0d0f);border:1px solid var(--line);border-radius:22px;padding:24px;max-height:88vh;overflow-y:auto}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:7px}
.input{width:100%;padding:15px;border-radius:13px;background:#000;border:1px solid var(--line);color:#fff;font-size:17px;font-weight:700;text-align:center}
.input.txt{text-align:left;font-weight:600;font-size:16px}
.input:focus{outline:none;border-color:var(--red)}
textarea.input{text-align:left;font-weight:500;font-size:13px;font-family:monospace;min-height:130px;resize:vertical}
.max-in{display:flex;align-items:center;gap:12px;background:#000;border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:12px}
.max-in .mi-ico{width:40px;height:40px;border-radius:11px;background:var(--card2);display:grid;place-items:center;font-size:19px}
.max-in .mi-t{flex:1}.max-in .mi-t b{font-size:15px}.max-in .mi-t small{color:var(--muted);font-size:11px;display:block}
.max-in input{width:96px;background:transparent;border:none;color:var(--red);font-size:26px;font-weight:900;text-align:right}
.max-in input:focus{outline:none}
.max-in .unit{color:var(--muted);font-weight:800}
.chart-card svg{width:100%;height:auto;display:block;overflow:hidden}
.chart-card{margin-bottom:14px}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}

.swatch{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

/* ============ TRANSICIONES MODERNAS (punto 10) ============ */
@keyframes screenIn{from{opacity:0;transform:translateY(22px) scale(.985)}to{opacity:1;transform:none}}
@keyframes cardRise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes floatGlow{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 22px 1px var(--red-glow)}}
.screen.active{animation:screenIn .5s cubic-bezier(.16,.84,.3,1) both}
/* aparición escalonada de tarjetas dentro de cada pantalla */
.screen.active>.card,.screen.active>.stat-row,.screen.active>.h-sec,.screen.active>[data-rise],.screen.active>.week{animation:cardRise .55s cubic-bezier(.16,.84,.3,1) both}
.screen.active>*:nth-child(1){animation-delay:.02s}
.screen.active>*:nth-child(2){animation-delay:.06s}
.screen.active>*:nth-child(3){animation-delay:.10s}
.screen.active>*:nth-child(4){animation-delay:.14s}
.screen.active>*:nth-child(5){animation-delay:.18s}
.screen.active>*:nth-child(6){animation-delay:.22s}
.screen.active>*:nth-child(7){animation-delay:.26s}
.screen.active>*:nth-child(8){animation-delay:.30s}
.card{transition:transform .22s cubic-bezier(.2,.8,.2,1),border-color .22s,box-shadow .22s}
.card.tap:active{transform:scale(.98)}
.btn{position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at var(--rx,50%) var(--ry,50%),rgba(255,255,255,.35),transparent 45%);opacity:0;transition:opacity .5s}
.btn:active::after{opacity:1;transition:opacity 0s}
.nav-b{transition:color .2s,transform .15s}
.nav-b:active{transform:scale(.9)}
.nav-b.on svg{animation:pop .4s both}
.modal-card{animation:pop .32s cubic-bezier(.16,.84,.3,1) both}
.chip{transition:transform .15s,background .2s,color .2s,border-color .2s}
.chip:active{transform:scale(.94)}

/* ============ SELECTOR DE IDIOMA ============ */
.lang-row{display:flex;gap:8px;margin-top:4px}
.lang-b{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border-radius:14px;background:var(--card2);border:1px solid var(--line);transition:.18s}

.wlog input{width:60px;background:transparent;border:none;color:var(--red);font-size:20px;font-weight:900;text-align:right}
.wlog input:focus{outline:none}
.wlog .u{color:var(--muted);font-weight:800;font-size:13px}
.set-hint{font-size:11px;color:var(--muted);margin-top:3px}
.set-hint b{color:#ffb03a}

/* ============ SIGUIENTES EJERCICIOS (punto 8) ============ */
.up-next{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:16px}
.up-next .un-h{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.up-next .un-t{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);font-weight:800}
.up-next .un-list{margin-top:10px;display:flex;flex-direction:column;gap:7px}
.up-next .un-i{display:flex;align-items:center;gap:10px;font-size:13.5px}
.up-next .un-n{width:22px;height:22px;border-radius:7px;background:var(--card2);display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--muted);flex:0 0 auto}
.up-next .un-i.first .un-n{background:var(--red);color:#fff}
.up-next .un-x{color:var(--muted);font-size:12px;margin-left:auto}
.up-next .un-caret{color:var(--muted);transition:transform .3s;font-size:18px}
.up-next.closed .un-list{display:none}
.up-next.closed .un-caret{transform:rotate(-90deg)}
.up-done{color:var(--muted);font-size:12.5px;text-align:center;padding:6px}

.pg-hero{background:linear-gradient(135deg,rgba(225,6,0,.16),rgba(225,6,0,.02));border:1px solid rgba(225,6,0,.3);border-radius:18px;padding:18px;margin-bottom:14px}

const WD=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
function assemble(cfg){
  const weeks=cfg.src.weeks.map(w=>{
    const gym={};w.days.forEach(d=>gym[d.d]=d.ex);
    const set=new Set([...Object.keys(gym),...(cfg.throwDays||[])]);
    const days=WD.filter(d=>set.has(d)).map(dn=>{
      let ex=[];
      if(cfg.mob)ex.push(RT(cfg.mob));
      if((cfg.throwDays||[]).includes(dn)&&cfg.throw)ex.push(RT(cfg.throw));
      if(gym[dn])ex=ex.concat(gym[dn]);
      return {d:dn,ex};
    });
    return {tag:w.tag,days};
  });
  return {id:cfg.src.id,name:cfg.name||cfg.src.name,weeks,note:cfg.note};
}

  try{firebase.firestore().collection('users').doc(AUTH.uid).set({db:DB,updatedAt:DB.updatedAt||Date.now(),email:AUTH.email},{merge:true}).catch(()=>{})}catch(e){}}

/* ---- Firebase init + auth ---- */
function initFirebase(){
  if(typeof firebase==='undefined'||!FIREBASE_CONFIG||!FIREBASE_CONFIG.apiKey)return false;
  try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);CLOUD=true;return true}
  catch(e){console.warn('[RODO] Firebase init falló:',e.message);CLOUD=false;return false}}
async function loadCloud(){
  if(!(CLOUD&&AUTH))return;
  try{
    const ref=firebase.firestore().collection('users').doc(AUTH.uid);
    const snap=await ref.get();
    if(snap.exists&&snap.data()&&snap.data().db){
      const rd=snap.data().db;
      // usa la nube como fuente de verdad
      applyingRemote=true;DB=rd;(DB.profiles||[]).forEach(ensureFields);
      try{localStorage.setItem(LS,JSON.stringify(DB))}catch(e){}applyingRemote=false;
    }else{
      // primera vez: sube lo que haya local a la nube
      pushCloud();
    }
  }catch(e){console.warn('[RODO] loadCloud:',e.message)}
}
function startCloudSync(){
  if(!(CLOUD&&AUTH))return;
  if(cloudUnsub){cloudUnsub();cloudUnsub=null}
  const ref=firebase.firestore().collection('users').doc(AUTH.uid);
  cloudUnsub=ref.onSnapshot(snap=>{
    if(snap.metadata.hasPendingWrites)return;       // eco de nuestra propia escritura
    if(SESS)return;                                  // no interrumpir un entrenamiento en curso
    if(!snap.exists||!snap.data()||!snap.data().db)return;
    const rd=snap.data().db;
    if((rd.updatedAt||0)<=(DB.updatedAt||0))return;  // ya tenemos algo igual o más nuevo
    applyingRemote=true;DB=rd;(DB.profiles||[]).forEach(ensureFields);
    try{localStorage.setItem(LS,JSON.stringify(DB))}catch(e){}applyingRemote=false;
    if(CUR){const f=DB.profiles.find(p=>p.id===CUR.id);if(f){CUR=f;rerender()}else{switchProfile()}}
    else if(document.getElementById('gate').style.display!=='none')initGate();
  },err=>console.warn('[RODO] sync:',err.message));
}

  el.innerHTML=`<div style="display:flex;align-items:center;gap:12px;margin:6px 0 10px">
      <button class="wk-close" style="width:38px;height:38px" onclick="go('plans')">‹</button>
      <div><div class="title-xl" style="font-size:22px">${esc(plan.name)}</div><div class="sub">${plan.weeks.length} ${t('weeksPct')}</div></div></div>
    ${plan.note?`<div class="card" style="padding:12px 14px"><p class="sub" style="font-size:12.5px;line-height:1.45">${esc(plan.note)}</p></div>`:''}
    ${hasMaxes(CUR.maxes)?`<div class="chip on" style="margin:4px 4px 12px">${t('maxesLabel')}: Sq ${CUR.maxes.squat} · Bn ${CUR.maxes.bench} · Cl ${CUR.maxes.clean} ${U()} <span onclick="editMaxes()" style="text-decoration:underline;margin-left:6px">${t('edit')}</span></div>`
      :`<div class="card" style="border-color:var(--red)"><div class="accent"></div><b>${t('introMaxesShort')}</b><p class="sub" style="margin:6px 0 10px">${t('needCalc')}</p><button class="btn sm" onclick="askMaxes(()=>renderPlan())">${t('introduce')}</button></div>`}
    <div id="weekList">${plan.weeks.map((w,wi)=>weekHTML(plan,w,wi,doneSet)).join('')}</div>`}
function weekHTML(plan,w,wi,doneSet){const dc=w.days.filter((d,di)=>doneSet.has(wi+'-'+di)).length;
  return`<div class="week ${wi===VIEW.week?'open':''}" id="wk${wi}"><div class="week-h" onclick="toggleWeek(${wi})">

          <div style="flex:1"><b>${esc(d.d)}</b><div class="sub">${d.ex.filter(e=>e.ref!=='routine').length} ${t('exercise').toLowerCase()} · ${d.ex.filter(e=>e.ref==='routine').length} rt</div></div>
          ${done?`<button class="wk-close" style="width:32px;height:32px;font-size:15px" onclick="event.stopPropagation();resetDay('${plan.id}',${wi},${di})">↺</button>`:'<div class="caret">›</div>'}</div>`}).join('')}</div></div>`}
function resetDay(planId,wi,di){confirm2(t('reset'),'—',t('reset'),()=>{
  CUR.sessions=CUR.sessions.filter(s=>!(s.plan===planId&&s.week===wi&&s.day===di));
  const pr=CUR.progress[planId];if(pr&&(wi<pr.week||(wi===pr.week&&di<=pr.day)))CUR.progress[planId]={week:wi,day:di};
  save();renderPlan();toast('✓','ok')})}
function toggleWeek(wi){const w=document.getElementById('wk'+wi);const was=w.classList.contains('open');

/* ---- persistencia de la sesión ---- */
function sessKey(){return 'rodo_sess_'+(CUR?CUR.id:'x')}
function saveSess(){try{if(SESS)localStorage.setItem(sessKey(),JSON.stringify(SESS));else localStorage.removeItem(sessKey())}catch(e){}}
function clearSess(){try{localStorage.removeItem(sessKey())}catch(e){}}
function barWeight(){return U()==='lb'?45:20}
function perSideStr(w){const bar=barWeight();if(w==null||w<=bar)return'';const s=Math.round((w-bar)/2*10)/10;if(s<=0)return'';return`${s} ${U()}/${t('perSide')}`}
function needsWeightInput(e){return e.ref==='bw'&&/\bdb\b|ds sb|low row|bent over row|\bbb\b|weighted|dumbbell|mancuerna/i.test(e.n)}
/* Peso sugerido para accesorios (el PDF no fija peso): estimado con tus máximos
   y ratios típicos de fuerza. Es orientativo — ajústalo a cómo te sientas. */
function accessoryWeight(e){
  if(e.ref!=='bw')return null;
  const bn=CUR.maxes.bench,sq=CUR.maxes.squat,n=(e.n||'').toLowerCase();
  if(/incline/.test(n)&&/\bdb\b|dumbbell/.test(n))return bn?{perHand:roundW(bn*0.27)}:null;
  if(/\bdb\b|ds sb|dumbbell|mancuerna/.test(n))return bn?{perHand:roundW(bn*0.30)}:null;   // press con mancuernas
  if(/low row|bent over row|\bbb\b.*row|\brow\b/.test(n))return bn?{total:roundW(bn*0.50)}:null; // remo
  if(/weighted pull|weighted.*pull/.test(n))return bn?{added:roundW(bn*0.12)}:null;           // dominada lastrada
  if(/weighted.*(glute|ham)|(glute|ham).*weighted/.test(n))return sq?{added:roundW(sq*0.12)}:null;
  return null;
}
function sugText(sug){if(!sug)return'';
  if(sug.perHand!=null)return`~${sug.perHand} ${U()} ${t('perHand')} (×2)`;
  if(sug.total!=null)return`~${sug.total} ${U()}`;
  if(sug.added!=null)return`+${sug.added} ${U()} ${t('added')}`;return''}
function sugSetW(sug){if(!sug)return'';
  if(sug.perHand!=null)return`~${sug.perHand}<small> ${U()}/${t('hand')}</small>`;
  if(sug.total!=null)return`~${sug.total}<small> ${U()}</small>`;
  if(sug.added!=null)return`+${sug.added}<small> ${U()}</small>`;return''}

function openWorkout(planId,wi,di){if(!hasMaxes(CUR.maxes)){askMaxes(()=>openWorkout(planId,wi,di));return}
  CUR.activePlan=planId;
  const plan=PLANS.find(p=>p.id===planId);const day=plan.weeks[wi].days[di];
  SESS={plan:planId,week:wi,day:di,dayName:day.d,tag:plan.weeks[wi].tag,ex:day.ex,idx:0,active:0,
    setDone:day.ex.map(e=>e.ref==='routine'?[false]:(Array.isArray(e.s)?e.s.map(()=>false):[false])),
    done:day.ex.map(()=>false),feels:[],start:Date.now()};

function openWorkoutUI(){
  document.getElementById('workout').classList.add('on');

function startClock(){clearInterval(clockTimer);clockTimer=setInterval(()=>{const s=Math.floor((Date.now()-SESS.start)/1000);
  document.getElementById('wkClock').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`},1000)}
function logAccessory(val){const e=SESS.ex[SESS.idx];const n=parseFloat((val+'').replace(',','.'));
  if(!isNaN(n)&&n>0)CUR.accessory[e.n]=n;else delete CUR.accessory[e.n];save()}

/* ---- carrusel de ejercicios (ruleta) ---- */
function exCarousel(){
  const chips=SESS.ex.map((e,i)=>{
    const done=SESS.done[i];const isActive=i===SESS.active;const isView=i===SESS.idx;
    const meta=e.ref==='routine'?'📋':e.ref==='bw'?'💪':'🏋️';
    const cls=['ex-chip',done?'done':'',isActive?'active':'',isView?'viewing':''].filter(Boolean).join(' ');
    const nm=e.n.length>28?e.n.slice(0,26)+'…':e.n;
    return`<div class="${cls}" id="chip${i}" onclick="viewEx(${i})"><div class="ec-top"><div class="ec-n">${done?'✓':i+1}</div><div class="ec-meta">${meta}</div></div><div class="ec-name">${esc(nm)}</div></div>`;
  }).join('');
  return`<div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:800;margin:2px 2px 2px">${t('allEx')}</div><div class="ex-carousel" id="exCar"><div class="pad"></div>${chips}<div class="pad"></div></div>`;
}
function viewEx(i){SESS.idx=i;saveSess();renderExercise()}
function startExercise(i){SESS.active=i;SESS.idx=i;saveSess();
  const b=document.getElementById('wkBody');b.style.animation='none';void b.offsetWidth;b.style.animation='fadeUp .4s both';renderExercise()}

function renderExercise(){const e=SESS.ex[SESS.idx];const body=document.getElementById('wkBody');const totalEx=SESS.ex.length;
  const doneCount=SESS.done.filter(Boolean).length;

  html+=`<div class="ex-count">${t('exercise')} ${SESS.idx+1} ${t('of')} ${totalEx}${SESS.done[SESS.idx]?' · '+t('doneEx'):''}</div><div class="ex-name">${esc(e.n)}</div>`;
  if(e.ref==='routine'){const list=e.list||(ROUTINES[e.rk]&&ROUTINES[e.rk].x)||[];
    html+=`<div class="ex-ref">${t('routineHint')}</div>
      <div class="card pad0" style="margin-bottom:14px"><div class="rt-list" style="padding:6px 16px">${list.map(r=>`<div><span>${esc(r[0])}</span><small>${esc(r[1])}</small></div>`).join('')}</div></div>`;
    if(!RO)html+=`<div class="wk-actions"><button class="btn" onclick="finishRoutine()">${t('routineDone')}</button></div>`;
  }else if(e.ref==='bw'){
    const sug=accessoryWeight(e);
    html+=`<div class="ex-ref">${t('bodyweight')}</div>`;
    if(sug)html+=`<div class="coach-box" style="margin:0 0 12px;border-color:rgba(255,176,58,.4);background:linear-gradient(135deg,rgba(255,176,58,.13),rgba(255,176,58,.02))"><div class="coach-ava" style="background:linear-gradient(135deg,#ffb03a,#E10600)">💡</div><div><div class="who" style="color:#ffb03a">${t('sugWeight')}</div><p><b style="color:#fff;font-size:17px">${sugText(sug)}</b><br><span style="font-size:12px">${t('adjustLevel')}</span></p></div></div>`;
    html+=`<div class="set-list">`;
    e.s.forEach((st,i)=>{const done=SESS.setDone[SESS.idx][i];const sw=sug?sugSetW(sug):'';

    html+=`</div>`;
    if(!RO)html+=coachHint(e)+`<div class="wk-actions"><button class="btn" onclick="finishActiveEx()">${t('finishEx')}</button></div>`;
  }else{const base=REF[e.ref](CUR.maxes);
    html+=`<div class="ex-ref">${t('reference')}: <b style="color:#fff">${REF_LABEL[e.ref]}</b> · ${Math.round(base)} ${U()}${CUR.adjust[e.n]?` · coach ×${CUR.adjust[e.n].toFixed(2)}`:''}</div>`;
    if(e.note)html+=`<div class="coach-box" style="margin-top:0"><div class="coach-ava">🎯</div><div><div class="who">Nota</div><p>${esc(e.note)}</p></div></div>`;
    html+=`<div class="set-list">`;
    e.s.forEach((st,i)=>{const[reps,pct]=st;const w=calcWeight(e,pct);const done=SESS.setDone[SESS.idx][i];const ps=w!=null?perSideStr(w):'';
      html+=`<div class="set ${done?'done':''} ${RO?'ro':''}" ${RO?'':`onclick="toggleSet(${i})"`}><div class="set-chk">${done?'✓':i+1}</div>

        ${pct?`<div class="set-pct">${pct}%</div>`:''}</div>`});
    html+=`</div>`;
    if(!RO)html+=coachHint(e)+`<div class="wk-actions"><button class="btn" onclick="finishActiveEx()">${t('finishEx')}</button></div>`;}
  if(RO)html+=`<div class="wk-actions"><button class="btn" onclick="startExercise(${SESS.idx})">${t('startThisEx')}</button><button class="btn ghost" onclick="viewEx(${SESS.active})">${t('backToActive')}</button></div>`;
  body.innerHTML=html;body.scrollTop=0;
  // centrar el chip SOLO en horizontal (sin mover la vista vertical → no recorta arriba)
  const car=document.getElementById('exCar'),chip=document.getElementById('chip'+SESS.idx);
  if(car&&chip){const target=chip.offsetLeft-(car.clientWidth-chip.clientWidth)/2;
    if(car.scrollTo){car.scrollTo({left:Math.max(0,target),behavior:'smooth'})}else{car.scrollLeft=Math.max(0,target)}}
}
function coachHint(e){if(/press|jerk|bench|incline|push/i.test(e.n)){
  const m={es:'Ejercicio con carga en hombro. Si notas pinchazo o dolor >2/10, baja el peso y márcalo como “molestia”. Prioriza volver fuerte, no rápido.',
    en:'Shoulder-loaded exercise. If you feel a pinch or pain >2/10, drop the weight and mark it as “discomfort”. Come back strong, not fast.',

  return`<div class="coach-box"><div class="coach-ava">🧠</div><div><div class="who">Coach</div><p>${(m[LANG]||m.es)}</p></div></div>`}return''}
function toggleSet(i){if(SESS.idx!==SESS.active)return;const arr=SESS.setDone[SESS.active];arr[i]=!arr[i];const e=SESS.ex[SESS.active];saveSess();renderExercise();
  if(arr[i]&&e.ref!=='routine'){const rest=/clean|squat|bench|jerk|press|pull|deadlift/i.test(e.n)?(e.ref==='bw'?60:120):75;openRest(rest)}}

function finishActiveEx(){const e=SESS.ex[SESS.active];if(e.ref!=='bw'&&e.ref!=='routine'){askFeel(e);return}markDoneAndAdvance()}

function nextUndone(){for(let k=1;k<=SESS.ex.length;k++){const j=(SESS.active+k)%SESS.ex.length;if(!SESS.done[j])return j}return null}

function resumeSession(){let s=null;try{s=JSON.parse(localStorage.getItem(sessKey()))}catch(e){}

function openRest(sec){const r=document.getElementById('rest');r.classList.add('on');const rt=document.getElementById('restTitle');if(rt)rt.textContent=t('rest');const sk=document.getElementById('skipRestBtn');if(sk)sk.textContent=t('skipRest');const ring=document.getElementById('restRing');const C=628;

let feelFor=null;

function feel(v){document.getElementById('feelSheet').classList.remove('on');SESS.feels.push({ex:feelFor.n,v});applyCoach(feelFor,v);

  CUR.adjust[e.n]=Math.round(f*100)/100}

function showCoach(msg,cb){

  html+=`<div class="ai-tip"><div class="ai-ava">🧠</div><div><div class="who">${t('assistant')}</div><p>${esc(aiAdvice())}</p></div></div>`;
  // hero peso corporal
  let delta='';if(wl.length>=2){const df=Math.round((wl[wl.length-1].kg-wl[0].kg)*10)/10;const cls=df>0?'up':df<0?'down':'flat';delta=`<span class="dlt ${cls}">${df>0?'+':''}${df} ${u}</span>`}
  html+=`<div class="pg-hero"><div class="dc-lbl" style="margin-bottom:8px">⚖️ ${t('bodyWeight')}</div>
    ${w?`<div class="pg-metric"><b>${w}</b><span class="u">${u}</span>${delta}</div>`:`<p class="sub">${t('noWeight')}</p>`}
    <button class="btn sm" style="margin-top:12px;width:100%" onclick="logBodyWeight()">＋ ${t('logWeight')}</button></div>`;
  // gráfico de peso corporal (debajo del peso)
  if(wl.length>=2)html+=`<div class="card chart-card"><b>${t('weightEvo')}</b>${weightChart()}</div>`;
  // diario: kcal + agua (con botón para escribir el valor a mano)
  const kt=kcalTarget(),wt=waterTarget();const kpct=Math.min(100,Math.round((d.kcal||0)/kt*100)),wpct=Math.min(100,Math.round((d.water||0)/wt*100));
  html+=`<div class="daily-grid">
    <div class="daily-c"><div class="dc-top"><span class="dc-ico">🍽️</span><span class="dc-lbl">${t('kcalToday')}</span><button class="mini-b" style="flex:0 0 auto;padding:4px 8px;margin-left:auto" onclick="setDailyVal('kcal')">✎</button></div>
      <div class="dc-val">${d.kcal||0}<small> / ${kt}</small></div>
      <div class="dc-bar"><i style="width:${kpct}%;background:linear-gradient(90deg,#ff7a00,#E10600)"></i></div>
      <div class="dc-btns"><button class="mini-b" onclick="addKcal(-100)">−100</button><button class="mini-b" onclick="addKcal(100)">＋100</button><button class="mini-b" onclick="addKcal(500)">＋500</button></div></div>
    <div class="daily-c"><div class="dc-top"><span class="dc-ico">💧</span><span class="dc-lbl">${t('waterToday')}</span><button class="mini-b" style="flex:0 0 auto;padding:4px 8px;margin-left:auto" onclick="setDailyVal('water')">✎</button></div>
      <div class="dc-val">${d.water||0}<small> / ${wt} L</small></div>
      <div class="dc-bar"><i style="width:${wpct}%;background:linear-gradient(90deg,#3aa0ff,#0066cc)"></i></div>
      <div class="dc-btns"><button class="mini-b" onclick="addWater(-0.25)">−¼</button><button class="mini-b" onclick="addWater(0.25)">＋¼L</button><button class="mini-b" onclick="addWater(0.5)">＋½L</button></div></div>
  </div>`;
  // gráficos de calorías y agua (solo si hay al menos 2 días con datos)
  const kGrad='<stop offset="0" stop-color="#ff9d2f"/><stop offset="1" stop-color="#E10600"/>';
  const wGrad='<stop offset="0" stop-color="#5ab8ff"/><stop offset="1" stop-color="#0066cc"/>';
  const kDays=dailyHistory('kcal',30).filter(x=>x.v>0).length;
  const wDays=dailyHistory('water',30).filter(x=>x.v>0).length;
  if(kDays>=2)html+=`<div class="card chart-card"><b>🍽️ ${t('kcalToday')} · ${t('last10')}</b>${dailyBarChart('kcal',kGrad,kt)}</div>`;
  if(wDays>=2)html+=`<div class="card chart-card"><b>💧 ${t('waterToday')} · ${t('last10')}</b>${dailyBarChart('water',wGrad,wt)}</div>`;
  // mis datos
  const b=CUR.body;const goalTxt=b.goal==='cut'?t('goalCut'):b.goal==='gain'?t('goalGain'):b.goal==='maintain'?t('goalMaintain'):'—';
  html+=`<div class="h-sec">${t('myData')}</div>
    <div class="card tap" onclick="setBodyData()"><div style="display:flex;gap:10px;text-align:center">
      <div style="flex:1"><div class="dc-lbl">${t('height')}</div><div style="font-size:20px;font-weight:900">${b.height?b.height+' <span style="font-size:12px;color:var(--muted)">cm</span>':'—'}</div></div>
      <div style="flex:1"><div class="dc-lbl">${t('age')}</div><div style="font-size:20px;font-weight:900">${b.age||'—'}</div></div>
      <div style="flex:1"><div class="dc-lbl">${t('goal')}</div><div style="font-size:15px;font-weight:900;margin-top:3px">${goalTxt}</div></div>
    </div><div class="sub" style="text-align:center;margin-top:10px;font-size:12px">✎ ${t('setData')}</div></div>`;
  // entrenamiento
  const vol=CUR.sessions.reduce((a,s)=>a+(s.vol||0),0);
  html+=`<div class="h-sec">🏋️ ${t('nav_plans')}</div>`;
  html+=`<div class="stat-row"><div class="stat red"><b>${CUR.sessions.length}</b><small>${t('sessions')}</small></div><div class="stat"><b>${(vol/1000).toFixed(1)}</b><small>${t('totalTons')}</small></div><div class="stat"><b>${calcStreak()}</b><small>${t('streak')}</small></div></div>`;
  const mh=CUR.maxHistory.slice();
  if(mh.length)html+=`<div class="card chart-card"><b>${t('evolutionMaxes')} (${u})</b>${lineChart(mh)}<div class="legend"><i><b style="background:var(--red)"></b>Squat</i><i><b style="background:#3aa0ff"></b>Bench</i><i><b style="background:#2ecc71"></b>Clean</i></div></div>`;
  else html+=`<div class="card"><b>${t('evolutionMaxes')}</b><button class="btn ghost sm" style="margin-top:10px;width:100%" onclick="editMaxes()">${t('introMaxes')}</button></div>`;
  if(sessions.length){html+=`<div class="card chart-card"><b>${t('volPerSession')}</b>${volChart(sessions)}</div>`;
    const wf=sessions.filter(s=>s.avgFeel);if(wf.length)html+=`<div class="card chart-card"><b>${t('feelEffort')}</b><p class="sub" style="margin:4px 0 8px;font-size:12px">${t('easyToPain')}</p>${feelChart(wf)}</div>`}
  el.innerHTML=html}
function lineChart(mh){const W=460,H=180,pad=30;const xs=mh.map((_,i)=>mh.length===1?W/2:pad+i*(W-2*pad)/(mh.length-1));
  const all=mh.flatMap(m=>[m.squat,m.bench,m.clean]);const mn=Math.min(...all)*0.9,mx=Math.max(...all)*1.05;const y=v=>H-pad-((v-mn)/(mx-mn))*(H-2*pad);
  const line=(k,c)=>{const pts=mh.map((m,i)=>`${xs[i]},${y(m[k])}`);const dots=mh.map((m,i)=>`<circle cx="${xs[i]}" cy="${y(m[k])}" r="4" fill="${c}"/>`).join('');
    return`<polyline points="${pts.join(' ')}" fill="none" stroke="${c}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>${dots}`};
  return`<svg viewBox="0 0 ${W} ${H}" style="margin-top:10px">${[0,.5,1].map(f=>`<line x1="${pad}" x2="${W-pad}" y1="${pad+f*(H-2*pad)}" y2="${pad+f*(H-2*pad)}" stroke="#26262a" stroke-width="1"/>`).join('')}${line('squat','#E10600')}${line('bench','#3aa0ff')}${line('clean','#2ecc71')}</svg>`}
function volChart(sessions){const s=sessions.slice(-10);const W=460,H=150,pad=24,bw=(W-2*pad)/s.length*0.6;const mx=Math.max(...s.map(x=>x.vol||0),1);
  return`<svg viewBox="0 0 ${W} ${H}" style="margin-top:10px">${s.map((x,i)=>{const h=((x.vol||0)/mx)*(H-2*pad);const cx=pad+i*(W-2*pad)/s.length+((W-2*pad)/s.length-bw)/2;
    return`<rect x="${cx}" y="${H-pad-h}" width="${bw}" height="${h}" rx="4" fill="url(#g1)"><animate attributeName="height" from="0" to="${h}" dur="0.6s" fill="freeze"/><animate attributeName="y" from="${H-pad}" to="${H-pad-h}" dur="0.6s" fill="freeze"/></rect>`}).join('')}
    <defs><linearGradient id="g1" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#ff5a45"/><stop offset="1" stop-color="#a30400"/></linearGradient></defs></svg>`}
function feelChart(sessions){const s=sessions.slice(-12);const W=460,H=130,pad=20;const xs=s.map((_,i)=>s.length===1?W/2:pad+i*(W-2*pad)/(s.length-1));
  const y=v=>pad+((v-1)/4)*(H-2*pad);const pts=s.map((x,i)=>`${xs[i]},${y(x.avgFeel)}`);const cols=['','#3aa0ff','#2ecc71','#f0a500','#ff7a00','#ff3b30'];
  return`<svg viewBox="0 0 ${W} ${H}" style="margin-top:6px"><polyline points="${pts.join(' ')}" fill="none" stroke="#555" stroke-width="2"/>${s.map((x,i)=>`<circle cx="${xs[i]}" cy="${y(x.avgFeel)}" r="5" fill="${cols[x.avgFeel]}"/>`).join('')}</svg>`}

/* =====================================================================
   PERFIL
   ===================================================================== */
const LANGS=[{c:'es',fl:'🇪🇸',n:'Español'},{c:'en',fl:'🇬🇧',n:'English'},{c:'fr',fl:'🇫🇷',n:'Français'}];
function renderProfile(){const el=document.getElementById('profile');const m=CUR.maxes;
  el.innerHTML=`<div style="margin:8px 4px 4px"><div class="title-xl">${t('nav_profile')}</div></div>
    <div class="card" style="text-align:center"><div class="accent"></div>
      <div style="position:relative;width:104px;margin:6px auto 10px" onclick="pickPhoto()">
        <div class="p-ava" style="width:104px;height:104px;margin:0 auto;${CUR.photo?`background-image:url(${CUR.photo});background-size:cover`:`background:linear-gradient(135deg,${CUR.color},#000)`}">${CUR.photo?'':initials(CUR.name)}</div>
        <div style="position:absolute;right:2px;bottom:2px;width:34px;height:34px;border-radius:50%;background:var(--red);display:grid;place-items:center;border:3px solid var(--bg2)">📷</div></div>
      <input class="input txt" id="pfName" value="${esc(CUR.name)}" onchange="renameProfile(this.value)" style="text-align:center;font-size:19px;font-weight:900;border:none;background:transparent">
      <div class="sub">${CUR.sessions.length} ${t('sessions').toLowerCase()} · ${t('streak').toLowerCase()} ${calcStreak()}</div></div>

    <div class="h-sec">🌐 ${t('language')}</div>
    <div class="lang-row">${LANGS.map(l=>`<button class="lang-b ${LANG===l.c?'on':''}" onclick="setLang('${l.c}')"><span class="fl">${l.fl}</span><b>${l.n}</b></button>`).join('')}</div>

    <div class="h-sec">${t('yourMaxes')} (1RM)</div>
    ${hasMaxes(m)?`<div class="stat-row"><div class="stat"><b>${m.squat}</b><small>SQUAT</small></div><div class="stat"><b>${m.bench}</b><small>BENCH</small></div><div class="stat"><b>${m.clean}</b><small>CLEAN</small></div></div><button class="btn ghost" style="margin-top:10px" onclick="editMaxes()">${t('editMaxes')}</button>`:`<button class="btn" onclick="editMaxes()">${t('introMaxes')}</button>`}

    <div class="h-sec">🧠 ${t('coachIA')}</div>
    <div class="card"><div style="display:flex;align-items:center;gap:12px"><div class="coach-ava">🧠</div>
      <div style="flex:1"><b>${t('smartCoach')}</b><div class="sub">${t('coachDesc')}</div></div></div></div>
    <div class="h-sec">${t('coachAdjustTitle')}</div>
    ${Object.keys(CUR.adjust).length?`<div class="card"><div class="rt-list">${Object.entries(CUR.adjust).map(([k,v])=>`<div><span>${esc(k)}</span><small style="color:${v>1?'var(--ok)':v<1?'var(--warn)':'var(--muted)'}">×${v.toFixed(2)}</small></div>`).join('')}</div><button class="btn ghost sm" style="margin-top:10px;width:100%" onclick="resetAdjust()">${t('resetAdjust')}</button></div>`:`<div class="card"><p class="sub">${t('noAdjust')}</p></div>`}

    <div class="h-sec">${t('dataSec')}</div>
    <button class="btn" onclick="shareApp()">${t('shareApp')}</button>
    <button class="btn dark" style="margin-top:10px" onclick="switchProfile()">${t('switchProfile')}</button>
    ${(CLOUD&&AUTH)?`<div class="card" style="margin-top:14px;padding:14px"><div class="sub" style="font-size:12px">${t('cloud_on')}</div><b style="font-size:13px">${esc(AUTH.email||'')}</b></div><button class="btn ghost" style="margin-top:6px" onclick="logout()">${t('logout')}</button>`:''}
    <button class="btn ghost" style="margin-top:10px" onclick="coachInfo()">${t('howCoach')}</button>
    <button class="btn ghost" style="margin-top:10px;color:var(--danger)" onclick="deleteProfile()">${t('deleteProfile')}</button>
    <div style="text-align:center;color:var(--muted);font-size:11px;margin:20px 0 4px">RODOVELOCITY · TopVelocity Fusion System</div>`}
function pickPhoto(){const f=document.getElementById('filePick');f.onchange=()=>{const file=f.files[0];if(!file)return;
  const rd=new FileReader();rd.onload=()=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const s=Math.min(img.width,img.height);
    c.width=c.height=256;const ctx=c.getContext('2d');ctx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,256,256);
    CUR.photo=c.toDataURL('image/jpeg',0.82);save();refreshTopAva();renderProfile();toast('Foto actualizada','ok')};img.src=rd.result};rd.readAsDataURL(file)};f.click()}
function renameProfile(v){v=v.trim();if(!v)return;CUR.name=v;save();refreshTopAva();toast('✓','ok')}
function resetAdjust(){confirm2(t('resetAdjust'),'—',t('reset'),()=>{CUR.adjust={};save();renderProfile();toast('✓','ok')})}
function exportData(){const blob=new Blob([JSON.stringify(CUR,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rodovelocity_'+CUR.name+'.json';a.click()}
function deleteProfile(){confirm2(t('deleteProfile'),'—',t('deleteProfile'),()=>{DB.profiles=DB.profiles.filter(p=>p.id!==CUR.id);save();switchProfile()},true)}
function shareApp(){const url=location.href;if(navigator.share){navigator.share({title:'RODOVELOCITY',text:'RODOVELOCITY 🔥',url}).catch(()=>{})}
  else if(navigator.clipboard){navigator.clipboard.writeText(url);toast('✓','ok')}else toast(url,'ok')}

/* =====================================================================
   MODAL / TOAST
   ===================================================================== */
function openModal(html){document.getElementById('modalCard').innerHTML=html;document.getElementById('modal').classList.add('on')}
function closeModal(){document.getElementById('modal').classList.remove('on')}
function confirm2(title,msg,okLabel,cb,danger){
  window._cf=cb;
  openModal(`<h2 style="font-weight:900;font-size:20px">${esc(title)}</h2>
    <p class="sub" style="margin:8px 0 18px">${esc(msg)}</p>
    <button class="btn" style="${danger?'background:linear-gradient(135deg,#ff3b30,#a30400)':''}" onclick="closeModal();(window._cf&&window._cf())">${esc(okLabel)}</button>
    <button class="btn ghost" style="margin-top:10px" onclick="closeModal()">${t('cancel')}</button>`)}
function coachInfo(){
  const intro={es:'Al terminar cada ejercicio principal te pregunta cómo te sentiste. Según tu respuesta, el coach ajusta el peso de ese mismo ejercicio para la próxima vez que te toque.',
    en:'After each main exercise it asks how you felt. Based on your answer, the coach adjusts the weight of that same exercise for next time.',
    fr:'Après chaque exercice principal, il te demande ton ressenti. Selon ta réponse, le coach ajuste le poids de ce même exercice pour la prochaine fois.'};
  const foot={es:'Verás cada ajuste como “×1.03”, “×0.95”, etc., en Perfil. Puedes reiniciarlos cuando quieras.',
    en:'You\'ll see each adjustment as “×1.03”, “×0.95”, etc. in Profile. You can reset them anytime.',
    fr:'Tu verras chaque ajustement comme “×1.03”, “×0.95”, etc. dans Profil. Tu peux les réinitialiser à tout moment.'};
  openModal(`<h2 style="font-weight:900;font-size:20px">🧠 ${t('smartCoach')}</h2>
    <p class="sub" style="margin:10px 0 8px;line-height:1.5">${intro[LANG]||intro.es}</p>
    <div class="rt-list" style="margin:6px 0 8px">
      <div><span>🪶 ${t('f1')}</span><small style="color:var(--ok)">+3%</small></div>
      <div><span>💪 ${t('f2')}</span><small>=</small></div>
      <div><span>🥵 ${t('f3')}</span><small style="color:var(--warn)">−2%</small></div>
      <div><span>🧨 ${t('f4')}</span><small style="color:#ff7a00">−5%</small></div>
      <div><span>⚠️ ${t('f5')}</span><small style="color:var(--danger)">−10%</small></div>
    </div>
    <p class="sub" style="font-size:13px;line-height:1.5">${foot[LANG]||foot.es}</p>
    <button class="btn" style="margin-top:16px" onclick="closeModal()">${t('understood')}</button>`)}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
/* guardar la sesión de entreno si la app se minimiza o cierra */
document.addEventListener('visibilitychange',()=>{if(SESS)saveSess()});
window.addEventListener('pagehide',()=>{if(SESS)saveSess()});
let toastT=null;
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on '+(type||'');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2400)}

/* =====================================================================
   ARRANQUE
   ===================================================================== */
document.getElementById('gateLogo').innerHTML=LOGO;
document.getElementById('authLogo').innerHTML=LOGO;
document.getElementById('brandLogo').innerHTML=LOGO;
document.documentElement.lang=LANG;
applyStaticI18n();
(function boot(){
  const cloudOk=initFirebase();
  let splashDone=false,authKnown=false;
  function routeAfterSplash(){
    document.getElementById('splash').style.display='none';
    if(!cloudOk){showGate();return}                 // sin Firebase → modo local
    if(AUTH){hideAuth();showGate()}                 // sesión ya iniciada → perfiles
    else{showAuth()}                                // pedir login
  }
  setTimeout(()=>{splashDone=true;routeAfterSplash()},3000);
  if(cloudOk){
    firebase.auth().onAuthStateChanged(async user=>{
      authKnown=true;
      if(user){
        AUTH=user;await loadCloud();startCloudSync();
        if(splashDone){hideAuth();if(!CUR&&document.getElementById('app').classList.contains('hidden'))showGate()}
      }else{
        AUTH=null;if(cloudUnsub){cloudUnsub();cloudUnsub=null}
        if(splashDone)showAuth();
      }
    });
  }
  // Service worker + auto-actualización: si sale una versión nueva, recarga sola
  // (salvo que estés en medio de un entreno, para no interrumpir).
  if('serviceWorker' in navigator){
    const hadController=!!navigator.serviceWorker.controller;
    let refreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(refreshing||!hadController)return;   // no recargar en la primera instalación
      if(SESS)return;                          // no interrumpir un entrenamiento en curso
      refreshing=true;location.reload();
    });
    navigator.serviceWorker.register('service-worker.js').then(reg=>{
      // busca actualización cada vez que se abre
      reg.update&&reg.update();
      reg.addEventListener('updatefound',()=>{
        const newSW=reg.installing;
        newSW&&newSW.addEventListener('statechange',()=>{
          if(newSW.state==='installed'&&navigator.serviceWorker.controller&&!SESS){
            toast('Actualizando a la última versión…','ok');
          }
        });
      });
    }).catch(err=>console.log('SW registration failed:',err));
  }
})();
</script>
