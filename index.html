<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="manifest" content="manifest.json">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='44' fill='%230a0a0a'/%3E%3Cpath d='M124 24c6 8 5.2 14.8 2 20 6.4-1.2 9.6 4 8.8 10.4-1.2 11.2-10.8 18.4-21.6 17.2-10.8-1.6-18-11.2-15.6-21.2 1.6-7.2 6.4-10 10-9.6-4-8.8.8-18.8 4-24 0 7.6 2.4 11.6 5.6 13.6 2-4.4.8-10.4-2.8-14.4z' fill='%23ff5a1f'/%3E%3C/svg%3E">
<title>RODOVELOCITY</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='11' fill='%230a0a0a'/%3E%3Cpath d='M31 6c1.5 2 1.3 3.7.5 5 1.6-.3 2.4 1 2.2 2.6-.3 2.8-2.7 4.6-5.4 4.3-2.7-.4-4.5-2.8-3.9-5.3.4-1.8 1.6-2.5 2.5-2.4-1-2.2.2-4.7 1-6 0 1.9.6 2.9 1.4 3.4.5-1.1.2-2.6-.7-3.6z' fill='%23ff5a1f'/%3E%3C/svg%3E">
<!-- Firebase (se cargan desde CDN; si no hay internet, la app funciona en local) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --red:#E10600; --red-dark:#a30400; --red-glow:rgba(225,6,0,.45);
  --bg:#0a0a0a; --bg2:#121214; --card:#17171a; --card2:#1e1e22;
  --line:#2a2a2e; --txt:#f5f5f7; --muted:#9a9aa2; --white:#ffffff;
  --ok:#2ecc71; --warn:#f0a500; --danger:#ff3b30;
  --r:18px; --safe: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,system-ui,sans-serif;
  background:var(--bg);color:var(--txt);overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:-2;
  background:radial-gradient(900px 500px at 80% -10%,rgba(225,6,0,.16),transparent 60%),
    radial-gradient(700px 600px at -10% 110%,rgba(225,6,0,.10),transparent 55%),
    linear-gradient(180deg,#0b0b0d,#050505)}
body::after{content:'';position:fixed;inset:0;z-index:-1;opacity:.04;pointer-events:none;
  background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);background-size:44px 44px}
img{display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}

#app{max-width:520px;margin:0 auto;min-height:100%;position:relative;padding-bottom:calc(88px + var(--safe))}
.screen{display:none;animation:fadeUp .45s cubic-bezier(.2,.7,.2,1) both;padding:0 18px}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 26px 2px var(--red-glow)}}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes flick{0%,100%{transform:rotate(-2deg) scale(1)}50%{transform:rotate(2deg) scale(1.05)}}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 18px 10px;position:sticky;top:0;z-index:30;
  background:linear-gradient(180deg,rgba(10,10,10,.92),rgba(10,10,10,.55) 70%,transparent);backdrop-filter:blur(6px)}
.brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:1px;font-size:19px}
.brand .lg{width:34px;height:34px;border-radius:10px;background:#141416;border:1px solid #2a2a2e;display:grid;place-items:center;
  box-shadow:0 6px 18px var(--red-glow);animation:glow 3.5s infinite}
.brand .lg svg{width:26px;height:26px}
.brand b{color:var(--white)} .brand span{color:var(--red)}
.avatar-mini{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--red);background:var(--card2)}
.avatar-mini.ph{display:grid;place-items:center;font-weight:800;color:var(--white)}

.card{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.card.pad0{padding:0}
.card .accent{position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(var(--red),var(--red-dark))}
.h-sec{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:22px 4px 12px;font-weight:800}
.title-xl{font-size:27px;font-weight:900;letter-spacing:.3px;margin:2px 0}
.sub{color:var(--muted);font-size:14px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:16px;border-radius:15px;font-weight:800;font-size:16px;
  background:linear-gradient(135deg,var(--red),#ff3b28);color:#fff;box-shadow:0 10px 26px var(--red-glow);transition:transform .12s,box-shadow .2s}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--card2);color:var(--txt);box-shadow:none;border:1px solid var(--line)}
.btn.sm{width:auto;padding:11px 16px;font-size:14px;border-radius:12px}
.btn.dark{background:#000;border:1px solid var(--line);box-shadow:none}
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:999px;background:var(--card2);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--muted)}
.chip.on{background:var(--red);color:#fff;border-color:var(--red)}

/* gate + auth */
#gate,#auth{position:fixed;inset:0;z-index:100;background:radial-gradient(700px 500px at 50% 0%,rgba(225,6,0,.18),transparent),#070707;
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center}
.gate-logo{width:104px;height:104px;border-radius:28px;background:#141416;border:1px solid #26262a;display:grid;place-items:center;margin-bottom:18px;
  box-shadow:0 18px 50px var(--red-glow);animation:pop .6s both,glow 3.5s 1s infinite}
.gate-logo svg{width:74px;height:74px}
.gate-title{font-size:34px;font-weight:900;letter-spacing:2px}
.gate-title span{color:var(--red)}
.gate-sub{color:var(--muted);margin:6px 0 30px;letter-spacing:3px;font-size:12px;text-transform:uppercase}
.profile-grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;max-width:420px}
.p-item{display:flex;flex-direction:column;align-items:center;gap:10px;animation:pop .5s both}
.p-ava{width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid var(--line);background:var(--card2);transition:transform .15s;display:grid;place-items:center;font-size:34px;font-weight:900;color:#fff}
.p-item:active .p-ava{transform:scale(.94)}
.p-item .p-ava.add{border-style:dashed;border-color:var(--red);color:var(--red);background:transparent}
.p-name{font-weight:700;font-size:15px}
.auth-box{width:100%;max-width:340px}
.auth-box .input{margin-bottom:12px}
.auth-alt{color:var(--muted);font-size:13px;margin-top:18px}
.auth-alt b{color:var(--red)}
.link{color:var(--red);font-weight:700;text-decoration:underline;cursor:pointer}

#nav{position:fixed;left:0;right:0;bottom:0;z-index:40;max-width:520px;margin:0 auto;
  display:flex;justify-content:space-around;padding:10px 8px calc(10px + var(--safe));
  background:linear-gradient(180deg,rgba(16,16,18,.4),rgba(10,10,12,.96));backdrop-filter:blur(16px);border-top:1px solid var(--line)}
.nav-b{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 14px;border-radius:14px;color:var(--muted);font-size:10.5px;font-weight:700;transition:color .2s;position:relative}
.nav-b svg{width:23px;height:23px}
.nav-b.on{color:var(--red)}
.nav-b.on::before{content:'';position:absolute;top:-1px;width:26px;height:3px;border-radius:3px;background:var(--red);box-shadow:0 0 12px var(--red-glow)}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:13px 10px;text-align:center}
.stat b{display:block;font-size:23px;font-weight:900;color:#fff}
.stat small{color:var(--muted);font-size:11px;letter-spacing:.5px}
.stat.red b{color:var(--red)}
.ring-wrap{display:flex;align-items:center;gap:18px}
.ring{width:96px;height:96px;flex:0 0 auto;position:relative}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-weight:900;font-size:20px}

.plan-card{display:flex;align-items:center;gap:14px;cursor:pointer}
.plan-ico{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;flex:0 0 auto;
  background:#141416;border:1px solid #26262a;box-shadow:0 8px 20px var(--red-glow)}
.plan-ico svg{width:38px;height:38px}
.plan-ico.lock{background:var(--card2);color:var(--muted);box-shadow:none;font-size:22px;font-weight:900}
.week{border:1px solid var(--line);border-radius:15px;margin-bottom:11px;overflow:hidden;background:var(--card);transition:border-color .2s}
.week.open{border-color:var(--red)}
.week-h{display:flex;align-items:center;gap:12px;padding:15px;cursor:pointer}
.week-num{width:38px;height:38px;border-radius:11px;background:var(--card2);display:grid;place-items:center;font-weight:900;font-size:15px;flex:0 0 auto}
.week.open .week-num{background:var(--red);color:#fff}
.week-tag{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:800}
.week-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.week.open .week-body{max-height:900px}
.day-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-top:1px solid var(--line);cursor:pointer}
.day-row:active{background:var(--card2)}
.day-ico{width:34px;height:34px;border-radius:10px;background:var(--card2);display:grid;place-items:center;font-size:15px;flex:0 0 auto}
.day-row.done .day-ico{background:var(--ok);color:#000}
.caret{margin-left:auto;color:var(--muted);transition:transform .3s}
.week.open .caret{transform:rotate(90deg)}

#workout{position:fixed;inset:0;z-index:80;background:radial-gradient(600px 500px at 50% -5%,rgba(225,6,0,.18),transparent),#060606;display:none;flex-direction:column}
#workout.on{display:flex;animation:fadeUp .4s both}
.wk-top{display:flex;align-items:center;justify-content:space-between;padding:20px 18px 8px;position:relative;z-index:6}
.wk-close{width:40px;height:40px;border-radius:50%;background:var(--card2);display:grid;place-items:center;font-size:20px;border:1px solid var(--line)}
.wk-prog{height:6px;background:var(--card2);border-radius:6px;margin:6px 18px 0;overflow:hidden}
.wk-prog i{display:block;height:100%;background:linear-gradient(90deg,var(--red),#ff5a45);border-radius:6px;transition:width .5s;box-shadow:0 0 12px var(--red-glow)}
.wk-body{flex:1;overflow-y:auto;padding:14px 18px 30px;display:flex;flex-direction:column}
.ex-count{color:var(--red);font-weight:900;letter-spacing:2px;font-size:13px}
.ex-name{font-size:30px;font-weight:900;line-height:1.05;margin:6px 0 2px}
.ex-ref{color:var(--muted);font-size:13px;margin-bottom:16px}
.set-list{display:flex;flex-direction:column;gap:10px}
.set{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px 16px;transition:.2s;animation:slideIn .35s both}
.set.done{opacity:.5;border-color:var(--ok)}
.set-chk{width:30px;height:30px;border-radius:9px;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center;transition:.2s;font-size:15px}
.set.done .set-chk{background:var(--ok);border-color:var(--ok);color:#000}
.set-info{flex:1}
.set-w{font-size:24px;font-weight:900}
.set-w small{font-size:13px;color:var(--muted);font-weight:700}
.set-meta{font-size:12px;color:var(--muted)}
.set-pct{margin-left:auto;font-size:12px;font-weight:800;color:var(--red);background:rgba(225,6,0,.12);padding:4px 9px;border-radius:8px}
.rest{position:absolute;inset:0;z-index:5;background:rgba(6,6,6,.94);backdrop-filter:blur(10px);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.rest.on{display:flex;animation:fadeUp .3s both}
.rest h3{letter-spacing:3px;color:var(--muted);font-size:13px;text-transform:uppercase}
.timer-ring{width:220px;height:220px;position:relative;margin:16px 0}
.timer-ring .t{position:absolute;inset:0;display:grid;place-items:center;font-size:56px;font-weight:900}
.rest-actions{display:flex;gap:10px}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:90;max-width:520px;margin:0 auto;background:linear-gradient(180deg,var(--card),#0d0d0f);
  border-top-left-radius:26px;border-top-right-radius:26px;border-top:1px solid var(--line);padding:22px 20px calc(26px + var(--safe));
  transform:translateY(110%);transition:transform .4s cubic-bezier(.2,.8,.2,1);box-shadow:0 -20px 50px rgba(0,0,0,.6)}
.sheet.on{transform:none}
.sheet-grip{width:44px;height:5px;border-radius:5px;background:var(--line);margin:0 auto 16px}
.feel-grid{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.feel{display:flex;align-items:center;gap:14px;padding:15px;border-radius:15px;background:var(--card2);border:1px solid var(--line);transition:.15s}
.feel:active{transform:scale(.98)}
.feel .emo{font-size:26px}
.feel b{display:block;font-size:15px}
.feel small{color:var(--muted);font-size:12px}
.feel.f1{border-left:4px solid #3aa0ff}.feel.f2{border-left:4px solid var(--ok)}
.feel.f3{border-left:4px solid var(--warn)}.feel.f4{border-left:4px solid #ff7a00}
.feel.f5{border-left:4px solid var(--danger)}
.coach-box{background:linear-gradient(135deg,rgba(225,6,0,.14),rgba(225,6,0,.03));border:1px solid rgba(225,6,0,.35);border-radius:15px;padding:15px;margin:14px 0;display:flex;gap:12px}
.coach-ava{width:38px;height:38px;border-radius:11px;flex:0 0 auto;background:linear-gradient(135deg,var(--red),#ff4d38);display:grid;place-items:center;font-size:18px;box-shadow:0 6px 16px var(--red-glow)}
.coach-box p{font-size:14px;line-height:1.45}
.coach-box .who{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--red);font-weight:800;margin-bottom:2px}
.modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:22px}
.modal.on{display:flex;animation:fadeUp .3s both}
.modal-card{width:100%;max-width:420px;background:linear-gradient(180deg,var(--card),#0d0d0f);border:1px solid var(--line);border-radius:22px;padding:24px;max-height:88vh;overflow-y:auto}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:7px}
.input{width:100%;padding:15px;border-radius:13px;background:#000;border:1px solid var(--line);color:#fff;font-size:17px;font-weight:700;text-align:center}
.input.txt{text-align:left;font-weight:600;font-size:16px}
.input:focus{outline:none;border-color:var(--red)}
textarea.input{text-align:left;font-weight:500;font-size:13px;font-family:monospace;min-height:130px;resize:vertical}
.max-in{display:flex;align-items:center;gap:12px;background:#000;border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:12px}
.max-in .mi-ico{width:40px;height:40px;border-radius:11px;background:var(--card2);display:grid;place-items:center;font-size:19px}
.max-in .mi-t{flex:1}.max-in .mi-t b{font-size:15px}.max-in .mi-t small{color:var(--muted);font-size:11px;display:block}
.max-in input{width:96px;background:transparent;border:none;color:var(--red);font-size:26px;font-weight:900;text-align:right}
.max-in input:focus{outline:none}
.max-in .unit{color:var(--muted);font-weight:800}
.chart-card svg{width:100%;height:auto;overflow:visible}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
.legend i{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.legend i b{width:10px;height:10px;border-radius:3px;display:inline-block}
.bar-track{height:9px;background:var(--card2);border-radius:9px;overflow:hidden;margin-top:6px}
.bar-track i{display:block;height:100%;border-radius:9px;transform-origin:left;animation:barGrow .8s both}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .em{font-size:44px;margin-bottom:10px;opacity:.5}
.toast{position:fixed;left:50%;top:24px;transform:translateX(-50%) translateY(-90px);z-index:600;background:var(--card2);border:1px solid var(--line);
  padding:13px 20px;border-radius:14px;font-weight:700;font-size:14px;transition:transform .4s;box-shadow:0 12px 30px rgba(0,0,0,.5);max-width:90%;text-align:center}
.toast.on{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--ok)} .toast.warn{border-color:var(--warn)}
.hidden{display:none!important}
.rt-list{margin-top:6px}
.rt-list div{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.rt-list div:last-child{border:none}
.rt-list small{color:var(--muted)}
.hist-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.hist-row .hi{width:40px;height:40px;border-radius:11px;background:var(--card2);display:grid;place-items:center;flex:0 0 auto;font-size:16px}
.badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;letter-spacing:.5px}
.badge.b1{background:rgba(58,160,255,.15);color:#3aa0ff}.badge.b2{background:rgba(46,204,113,.15);color:var(--ok)}
.badge.b3{background:rgba(240,165,0,.15);color:var(--warn)}.badge.b4{background:rgba(255,122,0,.15);color:#ff7a00}
.badge.b5{background:rgba(255,59,48,.15);color:var(--danger)}
.swatch{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
</style>
</head>
<body>

<!-- ============ AUTH (solo si Firebase está configurado) ============ -->
<div id="auth">
  <div class="gate-logo" id="authLogo"></div>
  <div class="gate-title">RODO<span>VELOCITY</span></div>
  <div class="gate-sub" id="authSub">Entra en tu cuenta</div>
  <div class="auth-box">
    <input class="input txt" id="auEmail" type="email" placeholder="Email" autocomplete="email">
    <input class="input txt" id="auPass" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn" id="auBtn" onclick="doAuth()">Entrar</button>
    <div class="auth-alt">
      <span id="auToggleTxt">¿No tienes cuenta?</span> <b class="link" onclick="toggleAuthMode()" id="auToggleBtn">Crear cuenta</b>
    </div>
    <div class="auth-alt"><span class="link" onclick="useLocal()">Usar solo en este dispositivo</span></div>
  </div>
</div>

<!-- ============ PROFILE GATE ============ -->
<div id="gate">
  <div class="gate-logo" id="gateLogo"></div>
  <div class="gate-title">RODO<span>VELOCITY</span></div>
  <div class="gate-sub">Elige tu perfil</div>
  <div class="profile-grid" id="profileGrid"></div>
  <div class="auth-alt" id="gateAccount"></div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand">
      <div class="lg" id="brandLogo"></div>
      <div>RODO<span>VELOCITY</span></div>
    </div>
    <img class="avatar-mini" id="topAva" onclick="go('profile')" alt="">
  </div>
  <section class="screen active" id="home"></section>
  <section class="screen" id="plans"></section>
  <section class="screen" id="plan"></section>
  <section class="screen" id="progress"></section>
  <section class="screen" id="profile"></section>
</div>

<!-- ============ NAV ============ -->
<div id="nav" class="hidden">
  <button class="nav-b on" data-s="home" onclick="go('home')">

<div id="workout">

    <button class="wk-close" onclick="quitWorkout()">✕</button>
    <div style="text-align:center"><div id="wkDayTag" style="font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase"></div><div id="wkClock" style="font-weight:900;font-size:15px;color:var(--red)">00:00</div></div>

    <div class="rest-actions">
      <button class="btn ghost sm" onclick="addRest(15)">+15s</button>

  </div>
</div>

/* ---- ensamblado: movilidad → tiro → gimnasio, en días de calendario ---- */
const WD=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
function assemble(cfg){
  const weeks=cfg.src.weeks.map(w=>{
    const gym={};w.days.forEach(d=>gym[d.d]=d.ex);
    const set=new Set([...Object.keys(gym),...(cfg.throwDays||[])]);
    const days=WD.filter(d=>set.has(d)).map(dn=>{
      let ex=[];
      if(cfg.mob)ex.push(RT(cfg.mob));
      if((cfg.throwDays||[]).includes(dn)&&cfg.throw)ex.push(RT(cfg.throw));
      if(gym[dn])ex=ex.concat(gym[dn]);
      return {d:dn,ex};
    });
    return {tag:w.tag,days};
  });
  return {id:cfg.src.id,name:cfg.name||cfg.src.name,weeks,note:cfg.note};
}

function load(){try{return JSON.parse(localStorage.getItem(LS))||{profiles:[]}}catch(e){return{profiles:[]}}}

/* ---- Nube (código de 4 dígitos) ---- */
function effectiveConfig(){
  try{const rt=localStorage.getItem('rodo_fbconfig');if(rt){const c=JSON.parse(rt);if(c&&c.apiKey)return c}}catch(e){}
  if(FIREBASE_CONFIG&&FIREBASE_CONFIG.apiKey)return FIREBASE_CONFIG;
  return null;
}
function fbReady(){const cfg=effectiveConfig();if(!cfg||typeof firebase==='undefined')return false;
  try{if(!firebase.apps.length)firebase.initializeApp(cfg);return true}catch(e){return false}}
function initCloud(){const code=localStorage.getItem('rodo_code');if(code&&fbReady())connectCode(code,true)}
function connectCode(code,silent){
  if(!fbReady()){if(!silent)configFirebase();return}
  firebase.auth().signInAnonymously().then(()=>{
    cloudCode=code;localStorage.setItem('rodo_code',code);
    spaceRef=firebase.firestore().collection('spaces').doc('rodo_'+code);CLOUD=true;
    spaceRef.get().then(snap=>{
      const rd=snap.exists&&snap.data().db;
      if(rd&&(rd.updatedAt||0)>(DB.updatedAt||0)){DB=rd;try{localStorage.setItem(LS,JSON.stringify(DB))}catch(e){}}
      else pushCloud();
      if(unsub)unsub();
      unsub=spaceRef.onSnapshot(s=>{if(!s.exists)return;const r=s.data().db;
        if(r&&(r.updatedAt||0)>(DB.updatedAt||0)&&!SESS){DB=r;try{localStorage.setItem(LS,JSON.stringify(DB))}catch(e){}
          if(CUR){const c=DB.profiles.find(p=>p.id===CUR.id);if(c){CUR=c;rerender()}else switchProfile()}else initGate()}});
      if(!silent){toast('Nube conectada · código '+code,'ok');closeModal();rerender()}
      if(document.getElementById('gate').style.display!=='none')initGate();
    }).catch(e=>{if(!silent)toast('Error nube: '+e.message,'warn')});
  }).catch(e=>{CLOUD=false;if(!silent)toast('Nube: activa "Anónimo" en Authentication ('+e.code+')','warn')});
}
function disconnectCloud(){if(unsub){unsub();unsub=null}CLOUD=false;spaceRef=null;cloudCode=null;localStorage.removeItem('rodo_code');rerender();toast('Nube desconectada')}
function showGate(){initGate();document.getElementById('gate').style.display='flex'}
function goCloud(){cloudModal()}
function cloudModal(){
  openModal(`<div style="text-align:center"><div class="coach-ava" style="width:54px;height:54px;font-size:26px;margin:0 auto 12px;background:linear-gradient(135deg,#2ecc71,#0a7)">☁️</div>
    <h2 style="font-weight:900;font-size:20px">Sincronizar con la nube</h2></div>
    ${CLOUD?`<p class="sub" style="text-align:center;margin:8px 0 14px">Conectado con el código <b style="color:#fff;font-size:20px;letter-spacing:3px">${esc(cloudCode)}</b>.<br>Usa este mismo código en tus otros móviles para tener los mismos datos.</p>
      <button class="btn ghost" onclick="disconnectCloud();closeModal()">Desconectar de la nube</button>`
    :`<p class="sub" style="text-align:center;margin:8px 0 14px">Elige un código de 4 dígitos y úsalo en todos tus móviles: tendrás los mismos datos en todos. Cada persona puede usar su propio código sin mezclarse.</p>
      <div class="field"><input class="input" id="cloudCodeIn" inputmode="numeric" maxlength="8" placeholder="1234" style="letter-spacing:8px;font-size:28px"></div>
      <button class="btn" onclick="submitCode()">Conectar</button>
      ${effectiveConfig()?'':`<p class="sub" style="font-size:11px;text-align:center;margin-top:12px">Falta configurar Firebase. <span class="link" onclick="configFirebase()">Configurar</span></p>`}`}
    <button class="btn dark" style="margin-top:10px" onclick="closeModal()">Cerrar</button>`);
  setTimeout(()=>{const i=document.getElementById('cloudCodeIn');if(i)i.focus()},200);
}
function submitCode(){const v=(document.getElementById('cloudCodeIn').value||'').trim();
  if(!/^\d{4,8}$/.test(v))return toast('Escribe un código de 4 a 8 dígitos','warn');connectCode(v,false)}
function configFirebase(){
  openModal(`<h2 style="font-weight:900;font-size:20px">Configurar Firebase</h2>
  <p class="sub" style="margin:6px 0 14px">Pega el objeto <b>firebaseConfig</b> de tu proyecto (Firebase → Config del proyecto → Tus apps).</p>
  <div class="field"><textarea class="input" id="fbConf" placeholder='{ "apiKey": "...", "authDomain": "...", "projectId": "...", "appId": "..." }'></textarea></div>
  <button class="btn" onclick="saveFbConfig()">Guardar</button>
  <button class="btn ghost" style="margin-top:8px" onclick="closeModal()">Cancelar</button>`);
}
function saveFbConfig(){
  let raw=document.getElementById('fbConf').value.trim();const s=raw.indexOf('{'),e=raw.lastIndexOf('}');
  if(s<0||e<0)return toast('Pega el objeto completo','warn');raw=raw.slice(s,e+1);
  try{const cfg=(new Function('return ('+raw+')'))();if(!cfg.apiKey||!cfg.projectId)return toast('Falta apiKey o projectId','warn');
    localStorage.setItem('rodo_fbconfig',JSON.stringify(cfg));toast('Guardado','ok');closeModal();setTimeout(()=>location.reload(),700);
  }catch(err){toast('Formato no válido','warn')}
}

/* =====================================================================
   GATE / PERFILES
   ===================================================================== */
const AV_COLORS=['#E10600','#ff7a00','#8e44ff','#00b3a4','#f0a500','#2ecc71'];
function initGate(){
  const g=document.getElementById('profileGrid');g.innerHTML='';
  (DB.profiles||[]).forEach((p,i)=>{
    const el=document.createElement('div');el.className='p-item';el.style.animationDelay=(i*.07)+'s';
    el.onclick=()=>enter(p.id);
    el.innerHTML=`<div class="p-ava" style="${p.photo?`background-image:url(${p.photo});background-size:cover`:`background:linear-gradient(135deg,${p.color},#000)`}">${p.photo?'':initials(p.name)}</div><div class="p-name">${esc(p.name)}</div>`;
    g.appendChild(el);
  });
  const add=document.createElement('div');add.className='p-item';add.style.animationDelay=((DB.profiles||[]).length*.07)+'s';
  add.onclick=createProfileModal;
  add.innerHTML=`<div class="p-ava add">+</div><div class="p-name">Nuevo perfil</div>`;
  g.appendChild(add);
  const acc=document.getElementById('gateAccount');if(acc)acc.innerHTML='';
}
function initials(n){return n.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase()}
function esc(s){return(s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function createProfileModal(){
  openModal(`<h2 style="font-weight:900;font-size:22px;margin-bottom:4px">Nuevo perfil</h2>
  <p class="sub" style="margin-bottom:18px">Cada perfil guarda sus propios máximos y progreso.</p>
  <div class="field"><label>Nombre</label><input class="input txt" id="npName" placeholder="Ej. Rodolfo" maxlength="20"></div>
  <div class="field"><label>Color</label><div class="swatch" id="npColors"></div></div>
  <button class="btn" style="margin-top:10px" onclick="saveNewProfile()">Crear perfil</button>`);
  let sel=AV_COLORS[Math.floor(Math.random()*AV_COLORS.length)];
  const cw=document.getElementById('npColors');
  AV_COLORS.forEach(c=>{const b=document.createElement('button');b.style.cssText=`width:38px;height:38px;border-radius:50%;background:${c};border:3px solid ${c===sel?'#fff':'transparent'}`;
    b.onclick=()=>{sel=c;[...cw.children].forEach(x=>x.style.borderColor='transparent');b.style.borderColor='#fff';cw.dataset.sel=c};cw.appendChild(b)});
  cw.dataset.sel=sel;setTimeout(()=>document.getElementById('npName').focus(),200);
}
function saveNewProfile(){
  const name=document.getElementById('npName').value.trim();
  if(!name)return toast('Escribe un nombre','warn');
  const color=document.getElementById('npColors').dataset.sel||AV_COLORS[0];
  if(!DB.profiles)DB.profiles=[];
  DB.profiles.push(newProfile(name,color));save();closeModal();initGate();toast('Perfil creado','ok');
}
function enter(id){CUR=DB.profiles.find(p=>p.id===id);if(!CUR)return;
  document.getElementById('gate').style.display='none';
  document.getElementById('app').classList.remove('hidden');document.getElementById('nav').classList.remove('hidden');
  refreshTopAva();go('home')}
function refreshTopAva(){const a=document.getElementById('topAva');
  if(CUR.photo){a.src=CUR.photo;a.classList.remove('ph');a.textContent=''}
  else{a.removeAttribute('src');a.classList.add('ph');a.style.background=`linear-gradient(135deg,${CUR.color},#000)`;a.textContent=initials(CUR.name)}}
function switchProfile(){document.getElementById('app').classList.add('hidden');document.getElementById('nav').classList.add('hidden');
  showGate();CUR=null}
function rerender(){const a=document.querySelector('.screen.active');if(a&&!document.getElementById('app').classList.contains('hidden'))go(a.id)}

function go(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  document.getElementById(s).classList.add('active');
  document.querySelectorAll('.nav-b').forEach(b=>b.classList.toggle('on',b.dataset.s===s||(s==='plan'&&b.dataset.s==='plans')));
  window.scrollTo(0,0);
  if(s==='home')renderHome();if(s==='plans')renderPlans();if(s==='plan')renderPlan();if(s==='progress')renderProgress();if(s==='profile')renderProfile();}

/* =====================================================================
   CÁLCULO
   ===================================================================== */
function hasMaxes(m){return m&&m.squat&&m.bench&&m.clean}
function U(){return (CUR&&CUR.unit==='lb')?'lb':'kg'}
function roundW(w){const r=U()==='lb'?5:2.5;return Math.round(w/r)*r}
function calcWeight(ex,pct){if(pct==null||ex.ref==='bw'||ex.ref==='routine')return null;
  let w=REF[ex.ref](CUR.maxes)*(pct/100);const f=CUR.adjust[ex.n];if(f)w*=f;return roundW(w)}

/* =====================================================================
   HOME
   ===================================================================== */
function renderHome(){
  const el=document.getElementById('home');const plan=PLANS[0];const prog=CUR.progress[plan.id];
  const totalDays=plan.weeks.reduce((a,w)=>a+w.days.length,0);
  const doneDays=CUR.sessions.filter(s=>s.plan===plan.id).length;
  const pctDone=Math.round(doneDays/totalDays*100);
  const nextTxt=prog?`Semana ${prog.week+1} · ${plan.weeks[prog.week].days[prog.day]?plan.weeks[prog.week].days[prog.day].d:''}`:'Aún no empezado';
  el.innerHTML=`
    <div style="margin:8px 4px 16px"><div class="sub">${greet()},</div><div class="title-xl">${esc(CUR.name.split(' ')[0])} 👊</div></div>
    <div class="card"><div class="accent"></div>
      <div class="ring-wrap">${ringSVG(pctDone)}
        <div><div style="font-size:12px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;font-weight:800">${esc(plan.name)}</div>
          <div style="font-size:20px;font-weight:900;margin:2px 0">${nextTxt}</div><div class="sub">${doneDays}/${totalDays} días completados</div></div></div>
      <button class="btn" style="margin-top:16px" onclick="startPlan('${plan.id}')">${prog?'▶ Continuar entrenamiento':'⚡ Empezar plan'}</button></div>
    <div class="stat-row">
      <div class="stat red"><b>${calcStreak()}</b><small>DÍAS RACHA</small></div>
      <div class="stat"><b>${CUR.sessions.length}</b><small>SESIONES</small></div>
      <div class="stat"><b>${totalVolumeK()}</b><small>TON. TOTAL</small></div></div>
    ${hasMaxes(CUR.maxes)?maxesMini():maxesPrompt()}
    <div class="h-sec">Últimas sesiones</div>${recentSessions()}`;
}
function greet(){const h=new Date().getHours();return h<6?'Buenas noches':h<12?'Buenos días':h<20?'Buenas tardes':'Buenas noches'}
function maxesMini(){const m=CUR.maxes;return`<div class="h-sec">Tus máximos</div>
  <div class="stat-row"><div class="stat"><b>${m.squat}</b><small>SQUAT ${U()}</small></div><div class="stat"><b>${m.bench}</b><small>BENCH ${U()}</small></div><div class="stat"><b>${m.clean}</b><small>CLEAN ${U()}</small></div></div>
  <button class="btn ghost sm" style="margin-top:10px;width:100%" onclick="editMaxes()">Editar máximos</button>`}
function maxesPrompt(){return`<div class="card" style="margin-top:14px;border-color:var(--red)"><div class="accent"></div>
  <b style="font-size:16px">Registra tus máximos 📏</b><p class="sub" style="margin:6px 0 12px">La app calcula todos los pesos a partir de tu Back Squat, Bench Press y Power Clean.</p>
  <button class="btn sm" onclick="editMaxes()">Introducir máximos</button></div>`}
function recentSessions(){const s=CUR.sessions.slice(-4).reverse();
  if(!s.length)return`<div class="empty"><div class="em">🏋️</div>Aún no has entrenado.<br>Empieza tu primer día para ver tu progreso aquí.</div>`;
  return`<div class="card">`+s.map(x=>{const pl=PLANS.find(p=>p.id===x.plan);
    return`<div class="hist-row"><div class="hi">✓</div><div style="flex:1"><b>S${x.week+1} · ${esc(x.dayName)}</b><div class="sub">${esc(pl?pl.name:'')} · ${fmtDate(x.date)}</div></div>${x.avgFeel?feelBadge(x.avgFeel):''}</div>`}).join('')+`</div>`}
function ringSVG(pct){const r=42,c=2*Math.PI*r,off=c-(pct/100)*c;
  return`<div class="ring"><svg width="96" height="96" viewBox="0 0 96 96"><circle cx="48" cy="48" r="${r}" stroke="#26262a" stroke-width="9" fill="none"/>
    <circle cx="48" cy="48" r="${r}" stroke="var(--red)" stroke-width="9" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" style="filter:drop-shadow(0 0 6px var(--red-glow))"/></svg><div class="pct">${pct}%</div></div>`}

/* =====================================================================
   PLANS
   ===================================================================== */
function renderPlans(){const el=document.getElementById('plans');
  el.innerHTML=`<div style="margin:8px 4px 4px"><div class="title-xl">Planes</div><div class="sub">Programas oficiales TopVelocity · movilidad + tiro + gimnasio</div></div>
  <div class="h-sec">Tus programas</div>
  ${PLANS.map(p=>{const done=CUR.sessions.filter(s=>s.plan===p.id).length;const tot=p.weeks.reduce((a,w)=>a+w.days.length,0);
    return`<div class="card plan-card" onclick="openPlan('${p.id}')"><div class="plan-ico">${LOGO}</div>
      <div style="flex:1"><b style="font-size:17px">${esc(p.name)}</b><div class="sub">${p.weeks.length} semanas · ${tot} días · ${done} hechos</div>
      <div class="bar-track"><i style="width:${tot?Math.round(done/tot*100):0}%;background:linear-gradient(90deg,var(--red),#ff5a45)"></i></div></div><div class="caret">›</div></div>`}).join('')}`}
function openPlan(id){VIEW.plan=id;go('plan')}
function startPlan(id){if(!hasMaxes(CUR.maxes)){askMaxes(()=>startPlan(id));return}
  VIEW.plan=id;const prog=CUR.progress[id];if(prog){VIEW.week=prog.week;VIEW.day=prog.day}else{VIEW.week=0;VIEW.day=0}
  openWorkout(id,VIEW.week,VIEW.day)}

/* =====================================================================
   PLAN DETAIL
   ===================================================================== */
function renderPlan(){const el=document.getElementById('plan');const plan=PLANS.find(p=>p.id===VIEW.plan)||PLANS[0];
  const doneSet=new Set(CUR.sessions.filter(s=>s.plan===plan.id).map(s=>s.week+'-'+s.day));
  el.innerHTML=`<div style="display:flex;align-items:center;gap:12px;margin:6px 0 10px">
      <button class="wk-close" style="width:38px;height:38px" onclick="go('plans')">‹</button>
      <div><div class="title-xl" style="font-size:22px">${esc(plan.name)}</div><div class="sub">${plan.weeks.length} semanas · sistema de porcentajes</div></div></div>
    ${plan.note?`<div class="card" style="padding:12px 14px"><p class="sub" style="font-size:12.5px;line-height:1.45">${esc(plan.note)}</p></div>`:''}
    ${hasMaxes(CUR.maxes)?`<div class="chip on" style="margin:4px 4px 12px">Máximos: Sq ${CUR.maxes.squat} · Bn ${CUR.maxes.bench} · Cl ${CUR.maxes.clean} ${U()} <span onclick="editMaxes()" style="text-decoration:underline;margin-left:6px">editar</span></div>`
      :`<div class="card" style="border-color:var(--red)"><div class="accent"></div><b>Introduce tus máximos</b><p class="sub" style="margin:6px 0 10px">Necesarios para calcular los pesos.</p><button class="btn sm" onclick="askMaxes(()=>renderPlan())">Introducir</button></div>`}
    <div id="weekList">${plan.weeks.map((w,wi)=>weekHTML(plan,w,wi,doneSet)).join('')}</div>`}
function weekHTML(plan,w,wi,doneSet){const dc=w.days.filter((d,di)=>doneSet.has(wi+'-'+di)).length;
  return`<div class="week ${wi===VIEW.week?'open':''}" id="wk${wi}"><div class="week-h" onclick="toggleWeek(${wi})">
      <div class="week-num">${wi+1}</div><div style="flex:1"><div class="week-tag">Semana ${wi+1}</div><b>${esc(w.tag)}</b></div>
      <div class="sub" style="font-size:12px">${dc}/${w.days.length}</div><div class="caret">›</div></div>
    <div class="week-body">${w.days.map((d,di)=>{const done=doneSet.has(wi+'-'+di);
        return`<div class="day-row ${done?'done':''}" onclick="openWorkout('${plan.id}',${wi},${di})"><div class="day-ico">${done?'✓':'▶'}</div>
          <div style="flex:1"><b>${esc(d.d)}</b><div class="sub">${d.ex.filter(e=>e.ref!=='routine').length} ejercicios · ${d.ex.filter(e=>e.ref==='routine').length} rutinas</div></div>
          ${done?`<button class="wk-close" style="width:32px;height:32px;font-size:15px" title="Reiniciar día" onclick="event.stopPropagation();resetDay('${plan.id}',${wi},${di})">↺</button>`:'<div class="caret">›</div>'}</div>`}).join('')}</div></div>`}
function resetDay(planId,wi,di){confirm2('Reiniciar día','Este día dejará de contar como completado y podrás volver a hacerlo desde cero.','Reiniciar',()=>{
  CUR.sessions=CUR.sessions.filter(s=>!(s.plan===planId&&s.week===wi&&s.day===di));
  const pr=CUR.progress[planId];if(pr&&(wi<pr.week||(wi===pr.week&&di<=pr.day)))CUR.progress[planId]={week:wi,day:di};
  save();renderPlan();toast('Día reiniciado','ok')})}
function toggleWeek(wi){const w=document.getElementById('wk'+wi);const was=w.classList.contains('open');
  document.querySelectorAll('.week').forEach(x=>x.classList.remove('open'));if(!was)w.classList.add('open')}

/* =====================================================================
   WORKOUT
   ===================================================================== */
let restTimer=null,clockTimer=null;
function openWorkout(planId,wi,di){if(!hasMaxes(CUR.maxes)){askMaxes(()=>openWorkout(planId,wi,di));return}
  const plan=PLANS.find(p=>p.id===planId);const day=plan.weeks[wi].days[di];
  SESS={plan:planId,week:wi,day:di,dayName:day.d,tag:plan.weeks[wi].tag,ex:day.ex,idx:0,
    setDone:day.ex.map(e=>e.ref==='routine'?[false]:(Array.isArray(e.s)?e.s.map(()=>false):[false])),feels:[],start:Date.now()};
  document.getElementById('workout').classList.add('on');
  document.getElementById('wkDayTag').textContent=`S${wi+1} · ${plan.weeks[wi].tag} · ${day.d}`;
  startClock();renderExercise()}
function startClock(){clearInterval(clockTimer);clockTimer=setInterval(()=>{const s=Math.floor((Date.now()-SESS.start)/1000);
  document.getElementById('wkClock').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`},1000)}
function renderExercise(){const e=SESS.ex[SESS.idx];const body=document.getElementById('wkBody');const totalEx=SESS.ex.length;
  document.getElementById('wkBar').style.width=Math.round(SESS.idx/totalEx*100)+'%';
  let html=`<div class="ex-count">EJERCICIO ${SESS.idx+1} / ${totalEx}</div><div class="ex-name">${esc(e.n)}</div>`;
  if(e.ref==='routine'){const list=e.list||(ROUTINES[e.rk]&&ROUTINES[e.rk].x)||[];
    html+=`<div class="ex-ref">Rutina · toca cada ejercicio al ritmo indicado</div>
      <div class="card pad0" style="margin-bottom:14px"><div class="rt-list" style="padding:6px 16px">${list.map(r=>`<div><span>${esc(r[0])}</span><small>${esc(r[1])}</small></div>`).join('')}</div></div>
      <button class="btn" onclick="finishRoutine()">✓ Rutina completada</button>`;
  }else if(e.ref==='bw'){
    html+=`<div class="ex-ref">Peso corporal / accesorio</div><div class="set-list">`;
    e.s.forEach((st,i)=>{const done=SESS.setDone[SESS.idx][i];
      html+=`<div class="set ${done?'done':''}" onclick="toggleSet(${i})"><div class="set-chk">${done?'✓':i+1}</div><div class="set-info"><div class="set-w">${st.r}<small> reps${st.tag?' · '+st.tag:''}</small></div></div></div>`});
    html+=`</div>`+coachHint(e)+`<button class="btn" style="margin-top:14px" onclick="nextExercise()">Siguiente →</button>`;
  }else{const base=REF[e.ref](CUR.maxes);
    html+=`<div class="ex-ref">Referencia: <b style="color:#fff">${REF_LABEL[e.ref]}</b> · ${Math.round(base)} ${U()}${CUR.adjust[e.n]?` · coach ×${CUR.adjust[e.n].toFixed(2)}`:''}</div>`;
    if(e.note)html+=`<div class="coach-box" style="margin-top:0"><div class="coach-ava">🎯</div><div><div class="who">Nota</div><p>${esc(e.note)}</p></div></div>`;
    html+=`<div class="set-list">`;
    e.s.forEach((st,i)=>{const[reps,pct]=st;const w=calcWeight(e,pct);const done=SESS.setDone[SESS.idx][i];
      html+=`<div class="set ${done?'done':''}" onclick="toggleSet(${i})"><div class="set-chk">${done?'✓':i+1}</div>
        <div class="set-info"><div class="set-w">${w!=null?w+'<small> '+U()+'</small>':'<small>peso libre</small>'}</div><div class="set-meta">${reps} reps${pct?' · '+pct+'%':''}</div></div>
        ${pct?`<div class="set-pct">${pct}%</div>`:''}</div>`});
    html+=`</div>`+coachHint(e)+`<button class="btn" style="margin-top:14px" onclick="nextExercise()">Siguiente →</button>`;}
  body.innerHTML=html;body.scrollTop=0}
function coachHint(e){if(/press|jerk|bench|incline|push/i.test(e.n))
  return`<div class="coach-box"><div class="coach-ava">🧠</div><div><div class="who">Coach</div><p>Ejercicio con carga en hombro. Si notas pinchazo o dolor >2/10, baja el peso y márcalo como “molestia”. Prioriza volver fuerte, no rápido.</p></div></div>`;return''}
function toggleSet(i){const arr=SESS.setDone[SESS.idx];arr[i]=!arr[i];const e=SESS.ex[SESS.idx];renderExercise();
  if(arr[i]&&e.ref!=='routine'){const rest=/clean|squat|bench|jerk|press|pull|deadlift/i.test(e.n)?(e.ref==='bw'?60:120):75;openRest(rest)}}
function finishRoutine(){SESS.setDone[SESS.idx][0]=true;nextExercise()}
function nextExercise(){const e=SESS.ex[SESS.idx];if(e.ref!=='bw'&&e.ref!=='routine'){askFeel(e);return}advance()}
function advance(){if(SESS.idx<SESS.ex.length-1){SESS.idx++;const b=document.getElementById('wkBody');b.style.animation='none';void b.offsetWidth;b.style.animation='fadeUp .4s both';renderExercise()}else finishWorkout()}
function openRest(sec){const r=document.getElementById('rest');r.classList.add('on');const ring=document.getElementById('restRing');const C=628;
  window._restLeft=sec;window._restTotal=sec;document.getElementById('restT').textContent=sec;ring.style.strokeDashoffset=0;
  clearInterval(restTimer);restTimer=setInterval(()=>{window._restLeft--;document.getElementById('restT').textContent=Math.max(window._restLeft,0);
    ring.style.strokeDashoffset=C*(1-window._restLeft/window._restTotal);if(window._restLeft<=0)skipRest()},1000)}
function addRest(s){window._restLeft+=s;window._restTotal+=s}
function skipRest(){clearInterval(restTimer);document.getElementById('rest').classList.remove('on')}
let feelFor=null;
function askFeel(e){feelFor=e;document.getElementById('feelEx').textContent=e.n;document.getElementById('feelSheet').classList.add('on')}
function feel(v){document.getElementById('feelSheet').classList.remove('on');SESS.feels.push({ex:feelFor.n,v});applyCoach(feelFor,v);
  const msg=coachMsg(feelFor,v);if(msg)setTimeout(()=>showCoach(msg,()=>advance()),260);else advance()}
function applyCoach(e,v){if(e.ref==='bw'||e.ref==='routine')return;let f=CUR.adjust[e.n]||1;
  if(v===1)f=Math.min(f*1.03,1.15);else if(v===3)f=Math.max(f*0.98,0.85);else if(v===4)f=Math.max(f*0.95,0.8);else if(v===5)f=Math.max(f*0.90,0.7);
  CUR.adjust[e.n]=Math.round(f*100)/100}
function coachMsg(e,v){const shoulder=/press|jerk|bench|incline|push/i.test(e.n);
  if(v===5)return{who:'Coach',t:shoulder?`Molestia en un ejercicio de hombro. Bajo un 10% la próxima vez y te recomiendo parar hoy este patrón. Si el dolor sube de 2/10, descansa y valora fisio. Volver fuerte > volver rápido.`:`Has notado molestia. Reduzco la carga un 10% para la próxima. Revisa técnica y no fuerces si el dolor persiste.`};
  if(v===4)return{who:'Coach',t:`Llegaste al fallo. Bajo un 5% la próxima sesión para que mantengas técnica explosiva — recuerda: velocidad, no grindeo.`};
  if(v===1)return{who:'Coach',t:`Muy fácil. Subo la carga ~3% la próxima vez. Sigue con técnica perfecta antes de añadir peso.`};return null}

  CUR.sessions=CUR.sessions.filter(s=>!(s.plan===rec.plan&&s.week===rec.week&&s.day===rec.day));CUR.sessions.push(rec);

function advanceProgress(){const plan=PLANS.find(p=>p.id===SESS.plan);let w=SESS.week,d=SESS.day;d++;
  if(d>=plan.weeks[w].days.length){d=0;w++}if(w>=plan.weeks.length){w=plan.weeks.length-1;d=plan.weeks[w].days.length-1}
  CUR.progress[SESS.plan]={week:w,day:d}}

function sessionVolume(s){let v=0;s.ex.forEach((e,ei)=>{if(e.ref==='bw'||e.ref==='routine')return;
  e.s.forEach((st,i)=>{if(!s.setDone[ei][i])return;const[reps,pct]=st;const w=calcWeightFor(e,pct,s.maxes||CUR.maxes);if(w&&typeof reps==='number')v+=w*reps})});return Math.round(v)}
function calcWeightFor(e,pct,maxes){if(pct==null)return null;let w=REF[e.ref](maxes)*pct/100;const f=CUR.adjust[e.n];if(f)w*=f;return roundW(w)}
function totalVolumeK(){return(CUR.sessions.reduce((a,s)=>a+(s.vol||0),0)/1000).toFixed(1)}
function calcStreak(){if(!CUR.sessions.length)return 0;
  const days=[...new Set(CUR.sessions.map(s=>new Date(s.date).toDateString()))].map(d=>new Date(d).getTime()).sort((a,b)=>b-a);
  let streak=0,cur=new Date();cur.setHours(0,0,0,0);
  for(const d of days){const diff=Math.round((cur-d)/86400000);if(diff<=1){streak++;cur=new Date(d)}else break}return streak}
function fmtDate(t){return new Date(t).toLocaleDateString('es-ES',{day:'numeric',month:'short'})}

function switchMaxUnit(nu){const box=document.getElementById('mxUnit');const cur=box.dataset.sel;if(cur===nu)return;

function lineChart(mh){const W=460,H=180,pad=30;const xs=mh.map((_,i)=>mh.length===1?W/2:pad+i*(W-2*pad)/(mh.length-1));
  const all=mh.flatMap(m=>[m.squat,m.bench,m.clean]);const mn=Math.min(...all)*0.9,mx=Math.max(...all)*1.05;const y=v=>H-pad-((v-mn)/(mx-mn))*(H-2*pad);
  const line=(k,c)=>{const pts=mh.map((m,i)=>`${xs[i]},${y(m[k])}`);const dots=mh.map((m,i)=>`<circle cx="${xs[i]}" cy="${y(m[k])}" r="4" fill="${c}"/>`).join('');
    return`<polyline points="${pts.join(' ')}" fill="none" stroke="${c}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>${dots}`};
  return`<svg viewBox="0 0 ${W} ${H}" style="margin-top:10px">${[0,.5,1].map(f=>`<line x1="${pad}" x2="${W-pad}" y1="${pad+f*(H-2*pad)}" y2="${pad+f*(H-2*pad)}" stroke="#26262a" stroke-width="1"/>`).join('')}${line('squat','#E10600')}${line('bench','#3aa0ff')}${line('clean','#2ecc71')}</svg>`}
function volChart(sessions){const s=sessions.slice(-10);const W=460,H=150,pad=24,bw=(W-2*pad)/s.length*0.6;const mx=Math.max(...s.map(x=>x.vol||0),1);
  return`<svg viewBox="0 0 ${W} ${H}" style="margin-top:10px">${s.map((x,i)=>{const h=((x.vol||0)/mx)*(H-2*pad);const cx=pad+i*(W-2*pad)/s.length+((W-2*pad)/s.length-bw)/2;
    return`<rect x="${cx}" y="${H-pad-h}" width="${bw}" height="${h}" rx="4" fill="url(#g1)"><animate attributeName="height" from="0" to="${h}" dur="0.6s" fill="freeze"/><animate attributeName="y" from="${H-pad}" to="${H-pad-h}" dur="0.6s" fill="freeze"/></rect>`}).join('')}
    <defs><linearGradient id="g1" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#ff5a45"/><stop offset="1" stop-color="#a30400"/></linearGradient></defs></svg>`}
function feelChart(sessions){const s=sessions.slice(-12);const W=460,H=130,pad=20;const xs=s.map((_,i)=>s.length===1?W/2:pad+i*(W-2*pad)/(s.length-1));
  const y=v=>pad+((v-1)/4)*(H-2*pad);const pts=s.map((x,i)=>`${xs[i]},${y(x.avgFeel)}`);const cols=['','#3aa0ff','#2ecc71','#f0a500','#ff7a00','#ff3b30'];
  return`<svg viewBox="0 0 ${W} ${H}" style="margin-top:6px"><polyline points="${pts.join(' ')}" fill="none" stroke="#555" stroke-width="2"/>${s.map((x,i)=>`<circle cx="${xs[i]}" cy="${y(x.avgFeel)}" r="5" fill="${cols[x.avgFeel]}"/>`).join('')}</svg>`}

  else if(navigator.clipboard){navigator.clipboard.writeText(url);toast('Enlace copiado','ok')}else toast(url,'ok')}

/* =====================================================================
   MODAL / TOAST
   ===================================================================== */
function openModal(html){document.getElementById('modalCard').innerHTML=html;document.getElementById('modal').classList.add('on')}
function closeModal(){document.getElementById('modal').classList.remove('on')}
function confirm2(title,msg,okLabel,cb,danger){
  window._cf=cb;
  openModal(`<h2 style="font-weight:900;font-size:20px">${esc(title)}</h2>
    <p class="sub" style="margin:8px 0 18px">${esc(msg)}</p>
    <button class="btn" style="${danger?'background:linear-gradient(135deg,#ff3b30,#a30400)':''}" onclick="closeModal();(window._cf&&window._cf())">${esc(okLabel)}</button>
    <button class="btn ghost" style="margin-top:10px" onclick="closeModal()">Cancelar</button>`)}
function coachInfo(){
  openModal(`<h2 style="font-weight:900;font-size:20px">🧠 Cómo funciona el coach</h2>
    <p class="sub" style="margin:10px 0 8px;line-height:1.5">Al terminar cada ejercicio principal te pregunta cómo te sentiste. Según tu respuesta, el coach ajusta el peso de <b style="color:#fff">ese mismo ejercicio</b> para <b style="color:#fff">la próxima vez</b> que te toque (no baja el del siguiente ejercicio del día):</p>

    <button class="btn" style="margin-top:16px" onclick="closeModal()">Entendido</button>`)}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
let toastT=null;
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on '+(type||'');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2400)}

document.getElementById('gateLogo').innerHTML=LOGO;
document.getElementById('authLogo').innerHTML=LOGO;
document.getElementById('brandLogo').innerHTML=LOGO;
(function boot(){
  showGate();     // siempre local-first: la app abre sin depender de la nube
  try{initCloud()}catch(e){console.warn(e)}   // reconexión silenciosa si hay código guardado
  // Register service worker for offline + PWA
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/service-worker.js').then(reg=>{
      console.log('SW registered');
      // Check for updates
      reg.addEventListener('updatefound',()=>{
        const newSW=reg.installing;
        newSW.addEventListener('statechange',()=>{
          if(newSW.state==='installed'&&navigator.serviceWorker.controller){
            toast('Nueva versión disponible. Recarga para actualizar.','info');
          }
        });
      });
    }).catch(err=>console.log('SW registration failed:',err));
  }
})();
</script>
